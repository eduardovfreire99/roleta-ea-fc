<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Roleta EA FC 26 — Turnos (UI Atualizada)</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

  <style>
    :root{
      --bg:#0b0f19;
      --card:#1e293b;
      --accent-grad:linear-gradient(135deg,#00f2fe,#4facfe);
      --text:#f8fafc;
      --border:#334155;
      --accent:#00f2fe;
      --good:#10b981;
      --danger:#ff4d6d;
      --muted:#94a3b8;
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI, Roboto, Arial, sans-serif}
    body{background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
    header{text-align:center;margin-bottom:8px}
    header h1{font-size:1.6rem;background:linear-gradient(to right,#00f2fe,#4facfe,#00ff87);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .card{width:100%;max-width:920px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
    .meta-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
    .room-ident{display:flex;align-items:center;gap:10px}
    .room-id{font-weight:800}
    .turn-banner{
      width:100%;
      border-radius:10px;
      padding:12px;
      text-align:center;
      margin-bottom:12px;
      font-weight:900;
      font-size:1.1rem;
      display:none;
    }
    .turn-banner.you { background: linear-gradient(90deg, rgba(16,185,129,0.12), rgba(16,185,129,0.06)); color: var(--good); border: 1px solid rgba(16,185,129,0.2); box-shadow:0 6px 18px rgba(16,185,129,0.06); }
    .turn-banner.wait { background: linear-gradient(90deg, rgba(148,163,184,0.04), rgba(148,163,184,0.02)); color: var(--muted); border: 1px solid rgba(52,65,85,0.12); }
    .row{display:flex;gap:8px;align-items:center}
    .input{padding:10px;border-radius:8px;border:1px solid var(--border);background:#0f172a;color:var(--text)}
    .btn{padding:10px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:800}
    .btn.create{background:linear-gradient(135deg,#34d399,#60a5fa);color:#06202a}
    .btn.enter{background:var(--accent-grad);color:#06202a}
    .btn.disabled{opacity:0.45;cursor:not-allowed}
    .players{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .player{background:#0f172a;padding:8px 10px;border-radius:8px;border:1px solid var(--border);color:#cbd5e1;display:flex;align-items:center;gap:8px}
    .player.host{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#452a00;font-weight:800}
    .player.inactive{opacity:0.55}
    .player.turn{outline:2px solid rgba(16,185,129,0.12);box-shadow:0 8px 20px rgba(16,185,129,0.03)}
    .controls{display:flex;gap:8px;align-items:center;margin-bottom:10px}
    .muted{color:var(--muted)}
    .roulette-wrapper{position:relative;height:120px;border-radius:10px;background:#0f172a;overflow:hidden;border:2px solid var(--border);margin-bottom:12px}
    .roulette-wrapper::before{content:'';position:absolute;left:50%;top:0;width:4px;height:100%;background:#ff0055;transform:translateX(-50%);z-index:10}
    .roulette-container{position:absolute;left:0;top:0;height:100%;display:flex;align-items:center;will-change:transform}
    .roulette-item{min-width:180px;height:80px;margin:0 5px;background:linear-gradient(145deg,#1e293b,#0f172a);border-radius:8px;border:1px solid #334155;display:flex;flex-direction:column;justify-content:center;align-items:center;font-weight:700;color:#e2e8f0}
    .result{padding:10px;border-radius:8px;border:1px solid rgba(16,185,129,0.18);display:none;margin-top:10px}
    #notice{position:fixed;top:12px;right:12px;background:rgba(16,185,129,0.12);color:#a7f3d0;padding:8px 12px;border:1px solid rgba(16,185,129,0.25);border-radius:8px;z-index:9999;display:none}
    .center { text-align:center; }
    @media (max-width:640px){ .roulette-item{min-width:140px} .turn-banner{font-size:1rem} }
  </style>
</head>
<body>
  <div id="notice"></div>

  <header>
    <h1>Roleta EA FC 26 — Turnos</h1>
    <div class="muted">Host controla a sala; cada jogador gira na sua vez</div>
  </header>

  <div class="card">
    <div id="loginArea" class="center" style="margin-bottom:12px">
      <div class="row" style="justify-content:center;gap:10px">
        <input id="usernameInput" class="input" placeholder="Seu nome" />
        <button id="createBtn" class="btn create">Criar Sala</button>
        <button id="showJoinBtn" class="btn enter">Entrar</button>
      </div>
      <div id="joinBox" class="row" style="margin-top:10px;display:none">
        <input id="joinCodeInput" class="input" placeholder="Código da sala (6 dígitos)" />
        <button id="confirmJoinBtn" class="btn enter">Confirmar</button>
        <div id="joinError" class="muted" style="margin-left:8px;display:none;color:#ff9b9b"></div>
      </div>
    </div>

    <div id="roomArea" style="display:none">
      <div class="meta-row">
        <div class="room-ident">
          <div class="muted">Sala</div>
          <div class="room-id" id="roomDisplay">-</div>
          <div id="turnInfo" class="muted" style="margin-left:12px"></div>
        </div>
        <div class="row">
          <div id="playersCount" class="muted">0 jogadores</div>
          <div id="shareControls" style="display:none;margin-left:10px">
            <button id="shareBtn" class="copy-btn">📤</button>
            <button id="copyRoomBtn" class="copy-btn">📋</button>
            <button id="leaveBtn" class="copy-btn">🚪</button>
          </div>
        </div>
      </div>

      <div id="turnBanner" class="turn-banner"></div>

      <div id="playersList" class="players" style="margin-bottom:12px"></div>

      <div class="controls">
        <label class="muted">Filtrar liga</label>
        <select id="leagueSelect" class="input" style="min-width:200px">
          <option value="all">Todas as Ligas (96)</option>
          <option value="premier">Premier League</option>
          <option value="bundesliga">Bundesliga</option>
          <option value="seriea">Série A</option>
          <option value="ligue1">Ligue 1</option>
          <option value="laliga">La Liga</option>
        </select>
        <div id="poolInfo" class="muted">96 times no pool</div>
      </div>

      <div id="hostStatus" class="muted" style="margin-top:8px"></div>

      <div id="spinIndicator" class="muted" style="margin-top:8px;display:none">⏳ Alguém está girando...</div>

      <div class="roulette-wrapper" style="margin-top:12px">
        <div id="rouletteContainer" class="roulette-container"></div>
      </div>

      <button id="spinBtn" class="btn create" style="width:100%;margin-top:12px">Girar Roleta</button>

      <div id="resultPanel" class="result center">
        <div style="color:var(--good);font-weight:800">Time Sorteado!</div>
        <div id="resultTeam" style="font-size:1.3rem;font-weight:900;margin-top:6px">-</div>
        <div id="resultLeague" class="muted" style="margin-top:6px">-</div>
        <div id="resultPlayer" class="muted" style="margin-top:6px">-</div>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCjfxIJyKBsg9U_GJu4JP2Taq6fMXiGpMA",
      authDomain: "roleta-ea-fc-cc40c.firebaseapp.com",
      databaseURL: "https://roleta-ea-fc-cc40c-default-rtdb.firebaseio.com",
      projectId: "roleta-ea-fc-cc40c",
      storageBucket: "roleta-ea-fc-cc40c.firebasestorage.app",
      messagingSenderId: "394316068027",
      appId: "1:394316068027:web:39151123593571769b659e"
    };

    // storage keys
    const KEY_PLAYER = 'roleta_player_id';
    const KEY_NAME = 'roleta_username';
    const KEY_ROOM = 'roleta_room_id';

    // identity
    let currentPlayerId = localStorage.getItem(KEY_PLAYER);
    if (!currentPlayerId) { currentPlayerId = Math.random().toString(36).substr(2,9); localStorage.setItem(KEY_PLAYER, currentPlayerId); }

    let db;
    let currentUsername = '';
    let currentRoomId = localStorage.getItem(KEY_ROOM) || '';
    let currentPool = [];
    let isSpinning = false;
    const ITEM_WIDTH = 190;

    // presence/host/settings
    let playerRef = null;
    let connectedRef = null;
    let onDisconnectRegistered = false;
    let hostRef = null;
    let roomHostId = null;
    let isHost = false;
    let hostOnDisconnectRegistered = false;
    let settingsRef = null;
    const GRACE_MS = 15000;

    let latestTurnOrder = [];

    // DOM
    const usernameInput = document.getElementById('usernameInput');
    const createBtn = document.getElementById('createBtn');
    const showJoinBtn = document.getElementById('showJoinBtn');
    const joinBox = document.getElementById('joinBox');
    const joinCodeInput = document.getElementById('joinCodeInput');
    const confirmJoinBtn = document.getElementById('confirmJoinBtn');
    const joinError = document.getElementById('joinError');

    const roomArea = document.getElementById('roomArea');
    const roomDisplay = document.getElementById('roomDisplay');
    const playersList = document.getElementById('playersList');
    const playersCount = document.getElementById('playersCount');
    const shareControls = document.getElementById('shareControls');
    const shareBtn = document.getElementById('shareBtn');
    const copyRoomBtn = document.getElementById('copyRoomBtn');
    const leaveBtn = document.getElementById('leaveBtn');

    const leagueSelect = document.getElementById('leagueSelect');
    const poolInfo = document.getElementById('poolInfo');
    const rouletteContainer = document.getElementById('rouletteContainer');
    const spinBtn = document.getElementById('spinBtn');
    const spinIndicator = document.getElementById('spinIndicator');
    const resultPanel = document.getElementById('resultPanel');
    const resultTeam = document.getElementById('resultTeam');
    const resultLeague = document.getElementById('resultLeague');
    const resultPlayer = document.getElementById('resultPlayer');
    const notice = document.getElementById('notice');
    const turnInfo = document.getElementById('turnInfo');
    const hostStatus = document.getElementById('hostStatus');
    const turnBanner = document.getElementById('turnBanner');

    function initFirebase(){ const app = firebase.initializeApp(firebaseConfig); db = firebase.database(app); }
    initFirebase();

    const teamsDB = {
      premier: { name: "Premier League", teams: ["Arsenal","Aston Villa","Bournemouth","Brentford","Brighton","Chelsea","Crystal Palace","Everton","Fulham","Ipswich Town","Leicester City","Liverpool","Manchester City","Manchester United","Newcastle United","Nottingham Forest","Southampton","Tottenham Hotspur","West Ham","Wolverhampton"] },
      bundesliga: { name: "Bundesliga", teams: ["Bayer Leverkusen","Bayern de Munique","Borussia Dortmund","Borussia Mönchengladbach","Eintracht Frankfurt","FC Augsburg","FC Heidenheim","FC St. Pauli","Holstein Kiel","Mainz 05","RB Leipzig","SC Freiburg","SV Werder Bremen","TSG Hoffenheim","Union Berlin","VfB Stuttgart","VfL Bochum","VfL Wolfsburg"] },
      seriea: { name: "Série A Itália", teams: ["AC Milan","Atalanta","Bologna","Cagliari","Como","Empoli","Fiorentina","Genoa","Hellas Verona","Inter de Milão","Juventus","Lazio","Lecce","Monza","Napoli","Parma","AS Roma","Torino","Udinese","Venezia"] },
      ligue1: { name: "Ligue 1 França", teams: ["Angers","Auxerre","Brest","Le Havre","Lens","Lille","Monaco","Montpellier","Nantes","Nice","Olympique de Lyon","Olympique de Marseille","PSG","Reims","Rennes","Saint-Étienne","Strasbourg","Toulouse"] },
      laliga: { name: "La Liga Espanha", teams: ["Alavés","Athletic Bilbao","Atlético de Madrid","Barcelona","Celta de Vigo","Espanyol","Getafe","Girona","Las Palmas","Leganés","Mallorca","Osasuna","Rayo Vallecano","Real Betis","Real Madrid","Real Sociedad","Sevilla","Valencia","Valladolid","Villarreal"] }
    };

    function shuffle(a){ return a.sort(()=>Math.random()-0.5); }
    function getActivePoolFromLeague(leagueValue){
      let pool=[];
      if (!leagueValue || leagueValue === 'all') { Object.keys(teamsDB).forEach(k => teamsDB[k].teams.forEach(t => pool.push({ name: t, league: teamsDB[k].name }))); }
      else { if (teamsDB[leagueValue]) teamsDB[leagueValue].teams.forEach(t => pool.push({ name: t, league: teamsDB[leagueValue].name })); }
      return pool;
    }
    function getActivePool(){ return getActivePoolFromLeague(leagueSelect.value); }
    function updatePoolInfo(){ currentPool = getActivePool(); poolInfo.textContent = `${currentPool.length} times disponíveis`; setupStaticRoulette(); }
    function setupStaticRoulette(){ const pool = getActivePool(); rouletteContainer.style.transition='none'; rouletteContainer.style.transform='translateX(0px)'; rouletteContainer.innerHTML=''; const display = pool.length>5 ? pool.slice(0,10) : [...pool,...pool,...pool]; display.forEach(it => { const d = document.createElement('div'); d.className='roulette-item'; d.innerHTML=`<div>${it.name}</div><div style="font-size:0.7rem;color:#94a3b8;margin-top:4px">${it.league}</div>`; rouletteContainer.appendChild(d); }); }

    async function generateUniqueRoomCode(attempts=8){ for (let i=0;i<attempts;i++){ const code = Math.floor(Math.random()*1000000).toString().padStart(6,'0'); const snap = await db.ref(`rooms/${code}`).get(); if (!snap.exists()) return code; } throw new Error('Não foi possível gerar código único'); }

    function showNotice(msg, ms=2500){ notice.textContent = msg; notice.style.display = 'block'; setTimeout(()=> notice.style.display = 'none', ms); }

    function applySettings(settings){ if (!settings) return; if (typeof settings.league !== 'undefined') { leagueSelect.value = settings.league || 'all'; updatePoolInfo(); showNotice(`Host mudou a liga para: ${settings.league}`, 1400); } }

    function setActiveFlag(active) { if (!playerRef) return; playerRef.update({ active: !!active }).catch(()=>{}); }
    document.addEventListener('visibilitychange', () => { setActiveFlag(document.visibilityState === 'visible'); updateSpinButtonState().catch(()=>{}); });

    async function advanceTurn() {
      if (!currentRoomId) return;
      const idxRef = db.ref(`rooms/${currentRoomId}/currentTurnIndex`);
      await idxRef.transaction(current => { if (current === null || current === undefined) return 0; return current + 1; });
      const orderSnap = await db.ref(`rooms/${currentRoomId}/turnOrder`).get();
      const order = orderSnap.val() || [];
      if (!Array.isArray(order) || order.length === 0) { await idxRef.set(0); }
      else { const idxSnap = await idxRef.get(); const val = idxSnap.exists() ? idxSnap.val() : 0; await idxRef.set(val % order.length); }
    }

    async function updateSpinButtonState() {
      try {
        if (!currentRoomId) { spinBtn.disabled = true; updateTurnBanner(false, ''); return; }

        const spinSnap = await db.ref(`rooms/${currentRoomId}/isSpinning`).get();
        if (spinSnap.exists() && spinSnap.val()) { spinBtn.disabled = true; updateTurnBanner(false, 'Giro em andamento'); return; }

        const hostSnap = await db.ref(`rooms/${currentRoomId}/host`).get();
        if (!hostSnap.exists()) { spinBtn.disabled = true; updateTurnBanner(false, 'Sem host'); return; }
        const hostVal = hostSnap.val();
        if (!hostVal || hostVal.online !== true) { spinBtn.disabled = true; updateTurnBanner(false, 'Aguardando host'); return; }

        const playersSnap = await db.ref(`rooms/${currentRoomId}/players`).get();
        const players = playersSnap.val() || {};
        const entries = Object.entries(players);
        if (entries.length === 0) { spinBtn.disabled = true; updateTurnBanner(false, 'Nenhum jogador'); return; }
        const allActive = entries.every(([id,p]) => p && p.online === true && p.active === true);
        if (!allActive) { spinBtn.disabled = true; updateTurnBanner(false, 'Aguardando todos ativos'); return; }

        const orderSnap = await db.ref(`rooms/${currentRoomId}/turnOrder`).get();
        const order = orderSnap.val() || [];
        if (!Array.isArray(order) || order.length === 0) { spinBtn.disabled = true; updateTurnBanner(false, 'Ordem vazia'); return; }
        const idxSnap = await db.ref(`rooms/${currentRoomId}/currentTurnIndex`).get();
        const idx = idxSnap.exists() ? idxSnap.val() : 0;
        const currentPid = order[idx % order.length];

        if (currentPid === currentPlayerId) {
          spinBtn.disabled = false;
          updateTurnBanner(true, 'É SUA VEZ — GIRAR AGORA');
        } else {
          spinBtn.disabled = true;
          // get name of currentPid
          const pSnap = await db.ref(`rooms/${currentRoomId}/players/${currentPid}`).get();
          const p = pSnap.val();
          const name = p && p.username ? p.username : 'Jogador';
          updateTurnBanner(false, `Vez de ${name}`);
        }
      } catch (e) {
        console.warn('updateSpinButtonState error', e);
        spinBtn.disabled = true;
        updateTurnBanner(false, '');
      }
    }

    function updateTurnBanner(isYourTurn, text) {
      if (isYourTurn) {
        turnBanner.className = 'turn-banner you';
        turnBanner.textContent = text || 'É SUA VEZ — GIRAR AGORA';
        turnBanner.style.display = 'block';
      } else {
        turnBanner.className = 'turn-banner wait';
        turnBanner.textContent = text || '';
        if (text && text.length) turnBanner.style.display = 'block'; else turnBanner.style.display = 'none';
      }
    }

    // CREATE ROOM
    createBtn.addEventListener('click', async () => {
      const name = usernameInput.value.trim();
      if (!name) { alert('Digite seu nome antes de criar a sala.'); return; }
      currentUsername = name; localStorage.setItem(KEY_NAME, name); createBtn.disabled = true;
      try {
        const code = await generateUniqueRoomCode();
        const hostNode = db.ref(`rooms/${code}/host`);
        const hostObj = { playerId: currentPlayerId, username: currentUsername, online: true, createdAt: firebase.database.ServerValue.TIMESTAMP };
        await hostNode.set(hostObj);
        try { db.ref(`rooms/${code}`).onDisconnect().remove(); } catch(e){}
        await db.ref(`rooms/${code}/settings`).set({ league:'all' });
        await db.ref(`rooms/${code}/turnOrder`).set([currentPlayerId]);
        await db.ref(`rooms/${code}/currentTurnIndex`).set(0);
        localStorage.setItem(KEY_ROOM, code);
        await enterRoom(code, true);
      } catch(e){ console.error(e); alert('Erro ao criar sala'); createBtn.disabled = false; }
    });

    // SHOW/HIDE JOIN
    showJoinBtn.addEventListener('click', () => { joinError.style.display='none'; joinBox.style.display = (joinBox.style.display === 'none' ? 'flex' : 'none'); if (joinBox.style.display !== 'none') joinCodeInput.focus(); });

    // CONFIRM JOIN
    confirmJoinBtn.addEventListener('click', async () => {
      const code = (joinCodeInput.value || '').trim();
      if (!/^\d{6}$/.test(code)) { joinError.textContent='Código inválido — 6 dígitos'; joinError.style.display='block'; return; }
      joinError.style.display='none';
      try {
        const roomSnap = await db.ref(`rooms/${code}`).get();
        if (!roomSnap.exists()) { joinError.textContent='Sala não encontrada.'; joinError.style.display='block'; return; }
        const hostSnap = await db.ref(`rooms/${code}/host`).get();
        const hostVal = hostSnap.val();
        if (!hostVal || hostVal.online !== true) { joinError.textContent='Sala sem host disponível.'; joinError.style.display='block'; return; }
        currentUsername = usernameInput.value.trim();
        if (!currentUsername) { joinError.textContent='Digite seu nome.'; joinError.style.display='block'; return; }
        localStorage.setItem(KEY_NAME, currentUsername);
        localStorage.setItem(KEY_ROOM, code);
        await enterRoom(code, false);
      } catch(e){ console.error(e); joinError.textContent='Erro ao entrar'; joinError.style.display='block'; }
    });

    // ENTER ROOM
    async function enterRoom(code, createdAsHost=false) {
      document.getElementById('loginArea').style.display='none';
      roomArea.style.display='block';
      roomDisplay.textContent = code;
      currentRoomId = code;

      playerRef = db.ref(`rooms/${code}/players/${currentPlayerId}`);
      connectedRef = db.ref('.info/connected');

      connectedRef.on('value', snap => {
        if (snap && snap.val() === true) {
          if (!onDisconnectRegistered && playerRef) {
            try { playerRef.onDisconnect().update({ online:false, lastSeen: firebase.database.ServerValue.TIMESTAMP, active:false }); } catch(e){}
            onDisconnectRegistered = true;
          }
          if (playerRef) {
            const activeNow = document.visibilityState === 'visible';
            playerRef.set({ username: currentUsername, joinedAt: firebase.database.ServerValue.TIMESTAMP, online:true, active:activeNow }).catch(()=>{});
          }
        }
      });

      hostRef = db.ref(`rooms/${code}/host`);
      hostRef.on('value', snap => {
        const v = snap.val();
        roomHostId = v ? v.playerId : null;
        isHost = roomHostId === currentPlayerId;
        shareControls.style.display = isHost ? 'inline-flex' : 'none';
        hostStatus.textContent = v ? `${v.username} (host) — ${v.online ? 'ativo' : 'ausente'}` : 'Sem host';
        if (isHost) {
          try {
            hostRef.update({ online:true, username: currentUsername }).catch(()=>{});
            if (!hostOnDisconnectRegistered) { hostRef.onDisconnect().update({ online:false, lastSeen: firebase.database.ServerValue.TIMESTAMP }); hostOnDisconnectRegistered = true; }
            try { db.ref(`rooms/${code}`).onDisconnect().remove(); } catch(e){}
          } catch(e){}
        }
        updateSpinButtonState().catch(()=>{});
      });

      settingsRef = db.ref(`rooms/${code}/settings`);
      settingsRef.on('value', snap => {
        const settings = snap.val() || { league:'all' };
        if (isSpinning) { window.__pendingSettings = settings; showNotice('Host mudou configurações — serão aplicadas após o giro'); }
        else applySettings(settings);
        updateSpinButtonState().catch(()=>{});
      });

      db.ref(`rooms/${code}/turnOrder`).transaction(current => {
        if (!current) return [currentPlayerId];
        if (!Array.isArray(current)) return [currentPlayerId];
        if (current.indexOf(currentPlayerId) === -1) current.push(currentPlayerId);
        return current;
      });

      db.ref(`rooms/${code}/turnOrder`).on('value', snap => { latestTurnOrder = snap.val() || []; renderTurnUI(); updateSpinButtonState().catch(()=>{}); });
      db.ref(`rooms/${code}/currentTurnIndex`).on('value', snap => { renderTurnUI(); updateSpinButtonState().catch(()=>{}); });

      db.ref(`rooms/${code}/players`).on('value', snap => { const players = snap.val() || {}; renderPlayers(players); updateSpinButtonState().catch(()=>{}); });

      db.ref(`rooms/${code}/lastResult`).on('value', snap => { const r = snap.val(); if (r) showResult(r); });

      db.ref(`rooms/${code}/isSpinning`).on('value', snap => {
        const s = snap.val();
        if (s && s.playerId !== currentPlayerId) { spinIndicator.style.display='block'; spinBtn.disabled = true; } else { spinIndicator.style.display='none'; if (!isSpinning) spinBtn.disabled = false; }
        updateSpinButtonState().catch(()=>{});
      });

      setupSpinListener();
      updatePoolInfo();
      updateSpinButtonState().catch(()=>{});

      copyRoomBtn.onclick = () => { navigator.clipboard.writeText(code).then(()=>alert('Código copiado!')); };
      shareBtn.onclick = () => {
        const link = `${window.location.origin}${window.location.pathname}?room=${code}`;
        if (navigator.share) navigator.share({ title:'Roleta: entre na sala', url:link }).catch(()=>navigator.clipboard.writeText(link).then(()=>alert('Link copiado!')));
        else navigator.clipboard.writeText(link).then(()=>alert('Link copiado!'));
      };
      leaveBtn.onclick = leaveRoomCleanup;
    }

    function renderPlayers(players) {
      playersList.innerHTML = '';
      const arr = Object.entries(players).map(([id,data]) => ({ id, ...data }));
      playersCount.textContent = `${arr.length} jogadores`;
      arr.forEach(p => {
        const el = document.createElement('div');
        el.className = 'player';
        if (p.id === roomHostId) el.classList.add('host');
        if (p.active === false) el.classList.add('inactive');
        const name = p.username || 'Jogador';
        const you = p.id === currentPlayerId ? ' (Você)' : '';
        const offline = p.online === false ? ' (offline)' : '';
        const inactive = p.active === false ? ' (inativo)' : '';
        el.textContent = name + you + offline + inactive;
        playersList.appendChild(el);
      });
      // highlight current turn
      db.ref(`rooms/${currentRoomId}/currentTurnIndex`).get().then(snap => {
        const idx = snap.val() || 0;
        const pid = latestTurnOrder.length ? latestTurnOrder[idx % latestTurnOrder.length] : null;
        for (let child of playersList.children) {
          child.classList.remove('turn');
          if (pid === currentPlayerId && child.textContent.includes('(Você)')) child.classList.add('turn');
          // best-effort: highlight host or matching name is unreliable for duplicates
        }
      }).catch(()=>{});
    }

    function renderTurnUI(){
      db.ref(`rooms/${currentRoomId}/currentTurnIndex`).get().then(snap => {
        const idx = snap.val() || 0;
        if (!Array.isArray(latestTurnOrder) || latestTurnOrder.length === 0) { turnInfo.textContent = ''; updateTurnBanner(false,''); return; }
        const pid = latestTurnOrder[idx % latestTurnOrder.length];
        db.ref(`rooms/${currentRoomId}/players/${pid}`).get().then(psnap => {
          const p = psnap.val();
          const name = p && p.username ? p.username : pid;
          if (pid === currentPlayerId) turnInfo.textContent = 'Sua vez de girar';
          else turnInfo.textContent = `Vez de ${name}`;
        }).catch(()=>{ turnInfo.textContent = ''; });
      }).catch(()=>{ turnInfo.textContent = ''; });
    }

    async function doSpin() {
      if (!currentRoomId) return;
      if (isSpinning) return;

      const hostSnap = await db.ref(`rooms/${currentRoomId}/host`).get();
      const hostVal = hostSnap.val();
      if (!hostVal || hostVal.online !== true) { alert('Aguardando host para girar a roleta'); return; }

      const playersSnap = await db.ref(`rooms/${currentRoomId}/players`).get();
      const players = playersSnap.val() || {};
      const entries = Object.entries(players);
      if (entries.length === 0) { alert('Nenhum jogador na sala'); return; }
      const allActive = entries.every(([id,p]) => p && p.online === true && p.active === true);
      if (!allActive) { alert('Aguardando todos os jogadores ativos na aba para girar a roleta'); return; }

      const orderSnap = await db.ref(`rooms/${currentRoomId}/turnOrder`).get();
      const order = orderSnap.val() || [];
      if (!Array.isArray(order) || order.length === 0) { alert('Ordem inválida'); return; }
      const idxSnap = await db.ref(`rooms/${currentRoomId}/currentTurnIndex`).get();
      const idx = idxSnap.exists() ? idxSnap.val() : 0;
      const currentPid = order[idx % order.length];
      if (currentPid !== currentPlayerId) { alert('Não é a sua vez de girar.'); return; }

      isSpinning = true;
      spinBtn.disabled = true;
      resultPanel.style.display = 'none';
      await db.ref(`rooms/${currentRoomId}/isSpinning`).set({ playerId: currentPlayerId, username: currentUsername, startTime: Date.now() });

      const pool = getActivePool();
      if (pool.length === 0) { alert('Nenhum time disponível'); return; }
      const winnerIndex = Math.floor(Math.random()*pool.length);
      const winner = pool[winnerIndex];

      let extended=[];
      for (let i=0;i<4;i++) extended = extended.concat(shuffle([...pool]));
      const targetIndex = Math.min(60, extended.length-10);
      extended[targetIndex] = winner;

      const spinData = { items: extended.map(it=>({name:it.name,league:it.league})), targetIndex, duration:5000, startTime:Date.now(), playerId:currentPlayerId, username:currentUsername };
      await db.ref(`rooms/${currentRoomId}/spinData`).set(spinData);

      renderSpinItems(spinData.items);
      animateToIndex(spinData.targetIndex, spinData.duration);

      setTimeout(async () => {
        await db.ref(`rooms/${currentRoomId}/lastResult`).set({ winner: winner.name, league: winner.league, username: currentUsername, playerId: currentPlayerId, timestamp: Date.now() });
        await db.ref(`rooms/${currentRoomId}/isSpinning`).remove();
        await db.ref(`rooms/${currentRoomId}/spinData`).remove();
        showResult({ winner: winner.name, league: winner.league, username: currentUsername });

        await advanceTurn();
        await updateSpinButtonState();

        isSpinning = false;
        spinBtn.disabled = false;
        onSpinFinished();
      }, spinData.duration);
    }

    function renderSpinItems(items){
      rouletteContainer.style.transition='none';
      rouletteContainer.style.transform='translateX(0px)';
      rouletteContainer.innerHTML='';
      items.forEach(it => { const d=document.createElement('div'); d.className='roulette-item'; d.innerHTML=`<div>${it.name}</div><div style="font-size:0.7rem;color:#94a3b8;margin-top:4px">${it.league}</div>`; rouletteContainer.appendChild(d); });
      void rouletteContainer.offsetHeight;
    }
    function animateToIndex(index,duration){
      const wrapperWidth = document.querySelector('.roulette-wrapper').offsetWidth;
      const centerOffset = (wrapperWidth/2) - (ITEM_WIDTH/2) - 5;
      const targetX = -(index * ITEM_WIDTH) + centerOffset;
      rouletteContainer.style.transition = `transform ${duration}ms cubic-bezier(0.15,0.85,0.35,1)`;
      rouletteContainer.style.transform = `translateX(${targetX}px)`;
    }

    function setupSpinListener(){
      if (!currentRoomId) return;
      db.ref(`rooms/${currentRoomId}/spinData`).on('value', snap => {
        const d = snap.val();
        if (!d) return;
        if (d.playerId === currentPlayerId) return;
        renderSpinItems(d.items);
        const now = Date.now();
        const elapsed = Math.max(0, now - d.startTime);
        const remaining = Math.max(0, (d.duration || 5000) - elapsed);
        if (remaining <= 0) {
          const wrapperWidth = document.querySelector('.roulette-wrapper').offsetWidth;
          const centerOffset = (wrapperWidth/2) - (ITEM_WIDTH/2) - 5;
          const targetX = -(d.targetIndex * ITEM_WIDTH) + centerOffset;
          rouletteContainer.style.transition='none';
          rouletteContainer.style.transform = `translateX(${targetX}px)`;
          onSpinFinished();
          return;
        }
        requestAnimationFrame(()=>requestAnimationFrame(()=> {
          rouletteContainer.style.transition = `transform ${remaining}ms cubic-bezier(0.15,0.85,0.35,1)`;
          const wrapperWidth = document.querySelector('.roulette-wrapper').offsetWidth;
          const centerOffset = (wrapperWidth/2) - (ITEM_WIDTH/2) - 5;
          const targetX = -(d.targetIndex * ITEM_WIDTH) + centerOffset;
          rouletteContainer.style.transform = `translateX(${targetX}px)`;
        }));
        spinIndicator.style.display='block';
        spinBtn.disabled = true;
        setTimeout(()=>{ spinIndicator.style.display='none'; if (!isSpinning) spinBtn.disabled=false; onSpinFinished(); }, remaining + 50);
      });
    }

    function showResult(r){
      resultTeam.textContent = r.winner || '-';
      resultLeague.textContent = r.league || '-';
      resultPlayer.textContent = `🎯 ${r.username} sorteou`;
      resultPanel.style.display = 'block';
    }

    function onSpinFinished(){ isSpinning = false; if (window.__pendingSettings) { applySettings(window.__pendingSettings); window.__pendingSettings = null; } }

    leagueSelect.addEventListener('change', () => {
      const newL = leagueSelect.value;
      if (!currentRoomId) return;
      if (isHost && settingsRef) { settingsRef.update({ league: newL }).catch(()=>{}); }
      else { if (settingsRef) settingsRef.get().then(snap => { const s = snap.val() || {}; leagueSelect.value = s.league || 'all'; updatePoolInfo(); }).catch(()=>{ leagueSelect.value='all'; updatePoolInfo(); }); }
      updatePoolInfo();
    });

    async function leaveRoomCleanup(){
      if (!currentRoomId) return;
      try { await db.ref(`rooms/${currentRoomId}/players/${currentPlayerId}`).remove(); } catch(e){}
      try { await db.ref(`rooms/${currentRoomId}/turnOrder`).transaction(current => { if (!current || !Array.isArray(current)) return current; return current.filter(id => id !== currentPlayerId); }); } catch(e){}
      if (isHost && currentRoomId) { try { await db.ref(`rooms/${currentRoomId}`).remove(); } catch(e){} }
      try { if (playerRef) playerRef.onDisconnect().cancel().catch(()=>{}); } catch(e){}
      try { if (hostRef) hostRef.onDisconnect().cancel().catch(()=>{}); } catch(e){}
      try { if (settingsRef) settingsRef.off(); } catch(e){}
      try { db.ref(`rooms/${currentRoomId}/players`).off(); db.ref(`rooms/${currentRoomId}/lastResult`).off(); db.ref(`rooms/${currentRoomId}/isSpinning`).off(); db.ref(`rooms/${currentRoomId}/spinData`).off(); db.ref(`rooms/${currentRoomId}/turnOrder`).off(); db.ref(`rooms/${currentRoomId}/currentTurnIndex`).off(); } catch(e){}
      localStorage.removeItem(KEY_ROOM);
      currentRoomId = '';
      document.getElementById('loginArea').style.display='block';
      roomArea.style.display='none';
    }

    // bindings
    document.getElementById('confirmJoinBtn').addEventListener('click', ()=>{});
    spinBtn.addEventListener('click', () => doSpin());

    // initial state
    const storedName = localStorage.getItem(KEY_NAME);
    if (storedName) usernameInput.value = storedName;
    const urlParams = new URLSearchParams(window.location.search);
    const roomParam = urlParams.get('room');
    if (roomParam && /^\d{6}$/.test(roomParam)) { joinBox.style.display='flex'; joinCodeInput.value = roomParam; }

    (function tryAutoJoinStored(){
      const storedRoom = localStorage.getItem(KEY_ROOM);
      const storedUser = localStorage.getItem(KEY_NAME);
      if (storedRoom && storedUser) {
        db.ref(`rooms/${storedRoom}/host`).get().then(snap => {
          const v = snap.val();
          if (v && v.online === true) {
            currentUsername = storedUser;
            usernameInput.value = storedUser;
            enterRoom(storedRoom, false).catch(()=>{});
          }
        }).catch(()=>{});
      }
    })();

  </script>
</body>

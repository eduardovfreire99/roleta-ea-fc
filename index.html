<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Roleta EA FC 26 — Multiplayer</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

  <style>
    :root{
      --bg:#0b0f19;
      --card:#1e293b;
      --accent-grad: linear-gradient(135deg,#00f2fe,#4facfe);
      --text:#f8fafc;
      --border:#334155;
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI, Roboto, Arial, sans-serif}
    body{background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
    header{text-align:center;margin-bottom:20px}
    header h1{font-size:2rem;background:linear-gradient(to right,#00f2fe,#4facfe,#00ff87);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .card{width:100%;max-width:920px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
    .top-row{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap}
    .left { display:flex; gap:12px; align-items:center; }
    .input { padding:10px;border-radius:8px;border:1px solid var(--border);background:#0f172a;color:var(--text) }
    .btn { padding:10px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:700 }
    .btn.create { background:linear-gradient(135deg,#34d399,#60a5fa); color:#06202a }
    .btn.enter { background:var(--accent-grad); color:#06202a }
    .small { font-size:0.9rem;color:#94a3b8 }
    .players { margin-top:12px; display:flex; gap:8px; flex-wrap:wrap }
    .player { background:#0f172a;padding:6px 10px;border-radius:8px;border:1px solid var(--border); color:#cbd5e1 }
    .roulette-wrapper { margin-top:14px; position:relative; height:120px; border-radius:10px; background:#0f172a; overflow:hidden; border:2px solid var(--border) }
    .roulette-wrapper::before{ content:''; position:absolute; left:50%; top:0; width:4px; height:100%; background:#ff0055; transform:translateX(-50%); z-index:10 }
    .roulette-container{ position:absolute; left:0; top:0; height:100%; display:flex; align-items:center; will-change:transform }
    .roulette-item{ min-width:180px; height:80px; margin:0 5px; background:linear-gradient(145deg,#1e293b,#0f172a); border-radius:8px; border:1px solid #334155; display:flex;flex-direction:column;justify-content:center;align-items:center; font-weight:700;color:#e2e8f0 }
    .controls { margin-top:12px; display:flex; gap:8px; align-items:center; flex-wrap:wrap }
    .share-area { display:flex; gap:8px; align-items:center }
    .copy-btn { background:#334155;color:var(--text);border:none;padding:8px;border-radius:8px;cursor:pointer }
    .result { margin-top:12px; padding:12px; border-radius:8px; border:1px solid rgba(16,185,129,0.25); display:none }
    .hidden { display:none !important }
    .error { color:#ffa3a3; background:rgba(255,163,163,0.06); padding:8px; border-radius:8px; margin-top:8px }
    .muted { color:#94a3b8 }
    .modal-row { display:flex; gap:8px; align-items:center; }
    #transientNotice { position:fixed; top:12px; right:12px; background:rgba(16,185,129,0.12); color:#a7f3d0; padding:8px 12px; border:1px solid rgba(16,185,129,0.25); border-radius:8px; z-index:9999; display:none }
    @media (max-width:600px) { .roulette-item { min-width:140px } }
  </style>
</head>
<body>
  <div id="transientNotice"></div>

  <header>
    <h1>Sorteador de Times EA FC 26</h1>
    <div class="small muted">Multiplayer em tempo real — crie sala ou entre por código</div>
  </header>

  <div class="card">
    <!-- LOGIN / CREATE UI -->
    <div id="loginArea" style="display:flex;flex-direction:column;gap:10px">
      <div class="modal-row">
        <input id="usernameInput" class="input" placeholder="Seu nome" />
        <button id="createBtn" class="btn create">Criar Sala</button>
        <button id="showJoinBtn" class="btn enter">Entrar</button>
      </div>

      <!-- join area revealed only when user clicks Entrar -->
      <div id="joinBox" class="modal-row hidden" style="margin-top:4px">
        <input id="joinCodeInput" class="input" placeholder="Código da sala (6 dígitos)" />
        <button id="confirmJoinBtn" class="btn enter">Confirmar</button>
        <div id="joinError" class="error hidden"></div>
      </div>
    </div>

    <!-- main room UI -->
    <div id="roomArea" class="hidden">
      <div class="top-row">
        <div class="left">
          <div class="small muted">Sala:</div>
          <div style="font-weight:800;margin-left:8px" id="roomDisplay">-</div>
        </div>

        <div class="share-area">
          <div id="playersCount" class="small muted">0 jogadores</div>
          <div id="shareControls" style="display:none">
            <button id="shareBtn" class="copy-btn">📤 Compartilhar</button>
            <button id="copyRoomBtn" class="copy-btn">📋 Copiar código</button>
            <button id="leaveBtn" class="copy-btn">🚪 Sair</button>
          </div>
        </div>
      </div>

      <div id="playersList" class="players"></div>

      <div class="controls">
        <label class="small muted">Filtrar liga</label>
        <!-- leagueSelect is disabled for non-hosts; host writes settings to DB -->
        <select id="leagueSelect" class="input">
          <option value="all">Todas as Ligas (96)</option>
          <option value="premier">Premier League</option>
          <option value="bundesliga">Bundesliga</option>
          <option value="seriea">Série A</option>
          <option value="ligue1">Ligue 1</option>
          <option value="laliga">La Liga</option>
        </select>
        <div id="poolInfo" class="small muted">96 times no pool</div>
      </div>

      <div id="spinIndicator" class="small muted hidden">⏳ Alguém está girando...</div>

      <div class="roulette-wrapper">
        <div id="rouletteContainer" class="roulette-container"></div>
      </div>

      <button id="spinBtn" class="btn create" style="width:100%">Girar Roleta</button>

      <div id="resultPanel" class="result">
        <div style="font-size:1rem;color:#10b981;font-weight:800">Time Sorteado!</div>
        <div id="resultTeam" style="font-size:1.6rem;font-weight:900;color:#fff;margin-top:6px">-</div>
        <div id="resultLeague" class="muted" style="margin-top:6px">-</div>
        <div id="resultPlayer" class="muted" style="margin-top:6px">-</div>
      </div>
    </div>
  </div>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCjfxIJyKBsg9U_GJu4JP2Taq6fMXiGpMA",
      authDomain: "roleta-ea-fc-cc40c.firebaseapp.com",
      databaseURL: "https://roleta-ea-fc-cc40c-default-rtdb.firebaseio.com",
      projectId: "roleta-ea-fc-cc40c",
      storageBucket: "roleta-ea-fc-cc40c.firebasestorage.app",
      messagingSenderId: "394316068027",
      appId: "1:394316068027:web:39151123593571769b659e"
    };

    // STORAGE KEYS
    const KEY_PLAYER = 'roleta_player_id';
    const KEY_NAME = 'roleta_username';
    const KEY_ROOM = 'roleta_room_id';

    // persisted identity
    let currentPlayerId = localStorage.getItem(KEY_PLAYER);
    if (!currentPlayerId) {
      currentPlayerId = Math.random().toString(36).substr(2,9);
      localStorage.setItem(KEY_PLAYER, currentPlayerId);
    }
    let db;
    let currentUsername = '';
    let currentRoomId = localStorage.getItem(KEY_ROOM) || '';
    let currentPool = [];
    let isSpinning = false;
    const ITEM_WIDTH = 190;

    // presence/host vars
    let playerRef = null;
    let connectedRef = null;
    let onDisconnectRegistered = false;
    let hostRef = null;
    let roomHostId = null;
    let isHost = false;
    let hostOnDisconnectRegistered = false;
    let settingsRef = null; // reference to rooms/{roomId}/settings
    const GRACE_MS = 15000;

    // pending settings to apply after spin
    window.__pendingSettings = null;

    // DOM
    const usernameInput = document.getElementById('usernameInput');
    const createBtn = document.getElementById('createBtn');
    const showJoinBtn = document.getElementById('showJoinBtn');
    const joinBox = document.getElementById('joinBox');
    const joinCodeInput = document.getElementById('joinCodeInput');
    const confirmJoinBtn = document.getElementById('confirmJoinBtn');
    const joinError = document.getElementById('joinError');

    const roomArea = document.getElementById('roomArea');
    const roomDisplay = document.getElementById('roomDisplay');
    const playersList = document.getElementById('playersList');
    const playersCount = document.getElementById('playersCount');
    const shareControls = document.getElementById('shareControls');
    const shareBtn = document.getElementById('shareBtn');
    const copyRoomBtn = document.getElementById('copyRoomBtn');
    const leaveBtn = document.getElementById('leaveBtn');

    const leagueSelect = document.getElementById('leagueSelect');
    const poolInfo = document.getElementById('poolInfo');
    const rouletteContainer = document.getElementById('rouletteContainer');
    const spinBtn = document.getElementById('spinBtn');
    const spinIndicator = document.getElementById('spinIndicator');
    const resultPanel = document.getElementById('resultPanel');
    const resultTeam = document.getElementById('resultTeam');
    const resultLeague = document.getElementById('resultLeague');
    const resultPlayer = document.getElementById('resultPlayer');
    const transientNotice = document.getElementById('transientNotice');

    // init firebase
    function initFirebase(){
      const app = firebase.initializeApp(firebaseConfig);
      db = firebase.database(app);
    }
    initFirebase();

    // teams DB
    const teamsDB = {
      premier: { name: "Premier League", teams: ["Arsenal","Aston Villa","Bournemouth","Brentford","Brighton","Chelsea","Crystal Palace","Everton","Fulham","Ipswich Town","Leicester City","Liverpool","Manchester City","Manchester United","Newcastle United","Nottingham Forest","Southampton","Tottenham Hotspur","West Ham","Wolverhampton"] },
      bundesliga: { name: "Bundesliga", teams: ["Bayer Leverkusen","Bayern de Munique","Borussia Dortmund","Borussia Mönchengladbach","Eintracht Frankfurt","FC Augsburg","FC Heidenheim","FC St. Pauli","Holstein Kiel","Mainz 05","RB Leipzig","SC Freiburg","SV Werder Bremen","TSG Hoffenheim","Union Berlin","VfB Stuttgart","VfL Bochum","VfL Wolfsburg"] },
      seriea: { name: "Série A Itália", teams: ["AC Milan","Atalanta","Bologna","Cagliari","Como","Empoli","Fiorentina","Genoa","Hellas Verona","Inter de Milão","Juventus","Lazio","Lecce","Monza","Napoli","Parma","AS Roma","Torino","Udinese","Venezia"] },
      ligue1: { name: "Ligue 1 França", teams: ["Angers","Auxerre","Brest","Le Havre","Lens","Lille","Monaco","Montpellier","Nantes","Nice","Olympique de Lyon","Olympique de Marseille","PSG","Reims","Rennes","Saint-Étienne","Strasbourg","Toulouse"] },
      laliga: { name: "La Liga Espanha", teams: ["Alavés","Athletic Bilbao","Atlético de Madrid","Barcelona","Celta de Vigo","Espanyol","Getafe","Girona","Las Palmas","Leganés","Mallorca","Osasuna","Rayo Vallecano","Real Betis","Real Madrid","Real Sociedad","Sevilla","Valencia","Valladolid","Villarreal"] }
    };

    // helpers
    function shuffle(a){ return a.sort(()=>Math.random()-0.5); }
    function getActivePoolFromLeague(leagueValue){
      let pool=[];
      if (!leagueValue || leagueValue === 'all') {
        Object.keys(teamsDB).forEach(k => teamsDB[k].teams.forEach(t => pool.push({ name: t, league: teamsDB[k].name })));
      } else {
        if (teamsDB[leagueValue]) teamsDB[leagueValue].teams.forEach(t => pool.push({ name: t, league: teamsDB[leagueValue].name }));
      }
      return pool;
    }
    function getActivePool(){ return getActivePoolFromLeague(leagueSelect.value); }

    function updatePoolInfo(){
      currentPool = getActivePool();
      poolInfo.textContent = `${currentPool.length} times disponíveis`;
      setupStaticRoulette();
    }
    function setupStaticRoulette(){
      const pool = getActivePool();
      rouletteContainer.style.transition='none';
      rouletteContainer.style.transform='translateX(0px)';
      rouletteContainer.innerHTML='';
      const display = pool.length>5 ? pool.slice(0,10) : [...pool,...pool,...pool];
      display.forEach(it => {
        const d = document.createElement('div');
        d.className = 'roulette-item';
        d.innerHTML = `<div>${it.name}</div><div style="font-size:0.7rem;color:#94a3b8;margin-top:4px">${it.league}</div>`;
        rouletteContainer.appendChild(d);
      });
    }

    // unique numeric room generator (6 digits)
    async function generateUniqueRoomCode(attempts = 8) {
      for (let i = 0; i < attempts; i++) {
        const code = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
        const snap = await db.ref(`rooms/${code}`).get();
        if (!snap.exists()) return code;
      }
      throw new Error('Não foi possível gerar código único. Tente novamente.');
    }

    // transient notice
    function showTransientNotice(msg, ms = 2500) {
      transientNotice.textContent = msg;
      transientNotice.style.display = 'block';
      setTimeout(() => { transientNotice.style.display = 'none'; }, ms);
    }

    // APPLY SETTINGS (called when settingsRef changes)
    function applySettings(settings) {
      if (!settings) return;
      // league
      if (typeof settings.league !== 'undefined') {
        // if currently spinning, defer application
        if (isSpinning) {
          window.__pendingSettings = settings;
          showTransientNotice('Configurações alteradas pelo host — serão aplicadas após o giro');
        } else {
          leagueSelect.value = settings.league || 'all';
          updatePoolInfo();
          showTransientNotice(`Host mudou a liga para: ${settings.league}`, 1800);
        }
      }
      // add other settings keys here (animationDuration, etc.)
    }

    // CREATE ROOM
    createBtn.addEventListener('click', async () => {
      const name = usernameInput.value.trim();
      if (!name) { alert('Digite seu nome antes de criar a sala.'); return; }
      currentUsername = name;
      localStorage.setItem(KEY_NAME, name);

      createBtn.disabled = true;
      try {
        const code = await generateUniqueRoomCode();
        const hostNode = db.ref(`rooms/${code}/host`);
        const hostObj = { playerId: currentPlayerId, username: currentUsername, online: true, createdAt: firebase.database.ServerValue.TIMESTAMP };
        await hostNode.set(hostObj);
        try { hostNode.onDisconnect().update({ online:false, lastSeen: firebase.database.ServerValue.TIMESTAMP }); hostOnDisconnectRegistered = true; } catch(e){}

        // initialize settings (default)
        await db.ref(`rooms/${code}/settings`).set({ league: 'all' });

        localStorage.setItem(KEY_ROOM, code);
        await enterRoom(code, true);
      } catch (err) {
        console.error(err);
        alert('Erro ao criar sala. Tente novamente.');
        createBtn.disabled = false;
      }
    });

    // SHOW JOIN BOX
    showJoinBtn.addEventListener('click', () => {
      joinError.classList.add('hidden');
      joinBox.classList.toggle('hidden');
      if (!joinBox.classList.contains('hidden')) joinCodeInput.focus();
    });

    // CONFIRM JOIN
    confirmJoinBtn.addEventListener('click', async () => {
      const code = (joinCodeInput.value || '').trim();
      if (!/^\d{6}$/.test(code)) {
        showJoinError('Código inválido — use 6 dígitos numéricos.');
        return;
      }
      joinError.classList.add('hidden');

      try {
        const roomSnap = await db.ref(`rooms/${code}`).get();
        if (!roomSnap.exists()) {
          showJoinError('Sala não encontrada.');
          return;
        }
        const hostSnap = await db.ref(`rooms/${code}/host`).get();
        const hostVal = hostSnap.val();
        if (!hostVal || hostVal.online !== true) {
          showJoinError('Sala sem host disponível. Tente novamente mais tarde.');
          return;
        }
        localStorage.setItem(KEY_ROOM, code);
        currentUsername = usernameInput.value.trim();
        if (!currentUsername) { showJoinError('Digite seu nome para entrar.'); return; }
        localStorage.setItem(KEY_NAME, currentUsername);
        await enterRoom(code, false);
      } catch (e) {
        console.error(e);
        showJoinError('Erro ao entrar — verifique o código e tente novamente.');
      }
    });

    function showJoinError(msg){
      joinError.textContent = msg;
      joinError.classList.remove('hidden');
    }

    // ENTER ROOM
    async function enterRoom(code, createdAsHost = false) {
      document.getElementById('loginArea').style.display = 'none';
      roomArea.classList.remove('hidden');
      roomDisplay.textContent = code;
      currentRoomId = code;

      // presence (player)
      playerRef = db.ref(`rooms/${code}/players/${currentPlayerId}`);
      connectedRef = db.ref('.info/connected');

      connectedRef.on('value', snap => {
        if (snap && snap.val() === true) {
          if (!onDisconnectRegistered && playerRef) {
            try { playerRef.onDisconnect().update({ online:false, lastSeen: firebase.database.ServerValue.TIMESTAMP }); } catch(e){}
            onDisconnectRegistered = true;
          }
          if (playerRef) {
            playerRef.set({ username: currentUsername, joinedAt: firebase.database.ServerValue.TIMESTAMP, online: true }).catch(()=>{});
          }
        }
      });

      // host handling
      hostRef = db.ref(`rooms/${code}/host`);
      hostRef.on('value', snap => {
        const v = snap.val();
        roomHostId = v ? v.playerId : null;
        isHost = roomHostId === currentPlayerId;
        shareControls.style.display = isHost ? 'inline-flex' : 'none';

        if (isHost) {
          try {
            hostRef.update({ online:true, username: currentUsername }).catch(()=>{});
            if (!hostOnDisconnectRegistered) {
              hostRef.onDisconnect().update({ online:false, lastSeen: firebase.database.ServerValue.TIMESTAMP });
              hostOnDisconnectRegistered = true;
            }
          } catch(e){}
        }

        setTimeout(() => electHostIfNeeded(), Math.floor(Math.random()*400));
      });

      // settings reference & real-time listener
      settingsRef = db.ref(`rooms/${code}/settings`);
      settingsRef.on('value', snap => {
        const settings = snap.val() || { league: 'all' };
        // apply immediately or defer if spinning
        if (isSpinning) {
          window.__pendingSettings = settings;
          showTransientNotice('Host mudou configurações — serão aplicadas após o giro', 2000);
        } else {
          applySettings(settings);
        }
      });

      // players and other listeners
      db.ref(`rooms/${code}/players`).on('value', snap => {
        const players = snap.val() || {};
        renderPlayers(players);
      });

      db.ref(`rooms/${code}/lastResult`).on('value', snap => {
        const r = snap.val();
        if (r) showResult(r);
      });

      db.ref(`rooms/${code}/isSpinning`).on('value', snap => {
        const s = snap.val();
        if (s && s.playerId !== currentPlayerId) {
          spinIndicator.classList.remove('hidden');
          spinBtn.disabled = true;
        } else {
          spinIndicator.classList.add('hidden');
          if (!isSpinning) spinBtn.disabled = false;
        }
      });

      setupSpinListener();
      updatePoolInfo();

      // handlers
      copyRoomBtn.onclick = () => { navigator.clipboard.writeText(code).then(()=>alert('Código copiado!')); };
      shareBtn.onclick = () => {
        const link = `${window.location.origin}${window.location.pathname}?room=${code}`;
        if (navigator.share) navigator.share({ title: 'Roleta: entre na sala', url: link }).catch(()=>navigator.clipboard.writeText(link).then(()=>alert('Link copiado!')));
        else navigator.clipboard.writeText(link).then(()=>alert('Link copiado!'));
      };
      leaveBtn.onclick = leaveRoomCleanup;
    }

    function renderPlayers(players) {
      playersList.innerHTML = '';
      const arr = Object.entries(players).map(([id,data]) => ({ id, ...data }));
      playersCount.textContent = `${arr.length} jogadores`;
      arr.forEach(p => {
        const d = document.createElement('div');
        d.className = 'player';
        d.textContent = p.username + (p.id === currentPlayerId ? ' (Você)' : '') + (p.online===false ? ' (offline)' : '');
        if (p.id === roomHostId) {
          const hb = document.createElement('span');
          hb.textContent = ' Host';
          hb.style.fontWeight = '800';
          hb.style.marginLeft = '8px';
          d.appendChild(hb);
        }
        playersList.appendChild(d);
      });
    }

    // election logic
    async function electHostIfNeeded(){
      if (!currentRoomId) return;
      try {
        const hostSnap = await db.ref(`rooms/${currentRoomId}/host`).get();
        const hostVal = hostSnap.val();
        const now = Date.now();
        if (hostVal && hostVal.online === true) return;
        if (hostVal && hostVal.online === false && hostVal.lastSeen && (now - hostVal.lastSeen) < GRACE_MS) return;

        const playersSnap = await db.ref(`rooms/${currentRoomId}/players`).get();
        const players = playersSnap.val() || {};
        const entries = Object.entries(players);
        if (entries.length === 0) return;

        let candidateId = null, candidateData = null, minJoined = Infinity;
        for (const [id,data] of entries) {
          const joined = data.joinedAt || 0;
          if (joined && joined < minJoined) { minJoined = joined; candidateId = id; candidateData = data; }
        }
        if (!candidateId) { candidateId = entries[0][0]; candidateData = entries[0][1]; }
        const candidate = { playerId: candidateId, username: candidateData.username || 'Jogador', online: true };

        const hostRefLocal = db.ref(`rooms/${currentRoomId}/host`);
        await hostRefLocal.transaction(current => {
          if (current === null) return candidate;
          if (current && current.online === false && current.lastSeen && (Date.now() - current.lastSeen) >= GRACE_MS) return candidate;
          return;
        }, (err, committed, snap) => {
          if (err) console.warn('host tx err', err);
          if (committed) {
            const val = snap.val();
            if (val && val.playerId === currentPlayerId) {
              try { hostRefLocal.update({ createdAt: firebase.database.ServerValue.TIMESTAMP }).catch(()=>{}); hostRefLocal.onDisconnect().update({ online:false, lastSeen: firebase.database.ServerValue.TIMESTAMP }); hostOnDisconnectRegistered = true; } catch(e){}
            }
          }
        });
      } catch(e) { console.warn('elect error', e); }
    }

    // SPIN logic
    async function doSpin() {
      if (isSpinning) return;
      const pool = getActivePool();
      if (pool.length === 0) { alert('Nenhum time disponível'); return; }
      isSpinning = true;
      spinBtn.disabled = true;
      resultPanel.style.display = 'none';

      db.ref(`rooms/${currentRoomId}/isSpinning`).set({ playerId: currentPlayerId, username: currentUsername, startTime: Date.now() });

      const winnerIndex = Math.floor(Math.random()*pool.length);
      const winner = pool[winnerIndex];

      let extended=[];
      for (let i=0;i<4;i++) extended = extended.concat(shuffle([...pool]));
      const targetIndex = Math.min(60, extended.length-10);
      extended[targetIndex] = winner;

      const spinData = { items: extended.map(it=>({name:it.name,league:it.league})), targetIndex, duration:5000, startTime: Date.now(), playerId: currentPlayerId, username: currentUsername };
      await db.ref(`rooms/${currentRoomId}/spinData`).set(spinData);

      renderSpinItems(spinData.items);
      animateToIndex(spinData.targetIndex, spinData.duration);

      setTimeout(async () => {
        await db.ref(`rooms/${currentRoomId}/lastResult`).set({ winner: winner.name, league: winner.league, username: currentUsername, playerId: currentPlayerId, timestamp: Date.now() });
        await db.ref(`rooms/${currentRoomId}/isSpinning`).remove();
        await db.ref(`rooms/${currentRoomId}/spinData`).remove();
        showResult({ winner: winner.name, league: winner.league, username: currentUsername });
        isSpinning = false;
        spinBtn.disabled = false;
        onSpinFinished();
      }, spinData.duration);
    }

    function renderSpinItems(items){
      rouletteContainer.style.transition='none';
      rouletteContainer.style.transform='translateX(0px)';
      rouletteContainer.innerHTML='';
      items.forEach(it => {
        const d = document.createElement('div');
        d.className = 'roulette-item';
        d.innerHTML = `<div>${it.name}</div><div style="font-size:0.7rem;color:#94a3b8;margin-top:4px">${it.league}</div>`;
        rouletteContainer.appendChild(d);
      });
      void rouletteContainer.offsetHeight;
    }
    function animateToIndex(index, duration){
      const wrapperWidth = document.querySelector('.roulette-wrapper').offsetWidth;
      const centerOffset = (wrapperWidth/2) - (ITEM_WIDTH/2) - 5;
      const targetX = -(index * ITEM_WIDTH) + centerOffset;
      rouletteContainer.style.transition = `transform ${duration}ms cubic-bezier(0.15,0.85,0.35,1)`;
      rouletteContainer.style.transform = `translateX(${targetX}px)`;
    }

    function setupSpinListener(){
      if (!currentRoomId) return;
      db.ref(`rooms/${currentRoomId}/spinData`).on('value', snap => {
        const d = snap.val();
        if (!d) return;
        if (d.playerId === currentPlayerId) return;
        renderSpinItems(d.items);
        const now = Date.now();
        const elapsed = Math.max(0, now - d.startTime);
        const remaining = Math.max(0, (d.duration || 5000) - elapsed);
        if (remaining <= 0) {
          const wrapperWidth = document.querySelector('.roulette-wrapper').offsetWidth;
          const centerOffset = (wrapperWidth/2) - (ITEM_WIDTH/2) - 5;
          const targetX = -(d.targetIndex * ITEM_WIDTH) + centerOffset;
          rouletteContainer.style.transition='none';
          rouletteContainer.style.transform = `translateX(${targetX}px)`;
          onSpinFinished();
          return;
        }
        requestAnimationFrame(()=>requestAnimationFrame(()=> {
          rouletteContainer.style.transition = `transform ${remaining}ms cubic-bezier(0.15,0.85,0.35,1)`;
          const wrapperWidth = document.querySelector('.roulette-wrapper').offsetWidth;
          const centerOffset = (wrapperWidth/2) - (ITEM_WIDTH/2) - 5;
          const targetX = -(d.targetIndex * ITEM_WIDTH) + centerOffset;
          rouletteContainer.style.transform = `translateX(${targetX}px)`;
        }));
        spinIndicator.classList.remove('hidden');
        spinBtn.disabled = true;
        setTimeout(()=>{ spinIndicator.classList.add('hidden'); if (!isSpinning) spinBtn.disabled = false; onSpinFinished(); }, remaining + 50);
      });
    }

    function showResult(r){
      resultTeam.textContent = r.winner || '-';
      resultLeague.textContent = r.league || '-';
      resultPlayer.textContent = `🎯 ${r.username} sorteou`;
      resultPanel.style.display = 'block';
      spinIndicator.classList.add('hidden');
      if (!isSpinning) spinBtn.disabled = false;
    }

    // Apply pending settings after spin finishes
    function onSpinFinished() {
      isSpinning = false;
      if (window.__pendingSettings) {
        applySettings(window.__pendingSettings);
        window.__pendingSettings = null;
      }
    }

    // LEAGUE SELECT: host-only writes to DB settings; everyone listens and applies.
    leagueSelect.addEventListener('change', () => {
      const newLeague = leagueSelect.value;
      if (!currentRoomId) return;
      if (isHost && settingsRef) {
        settingsRef.update({ league: newLeague }).catch(err => console.warn('Erro ao atualizar settings:', err));
      } else {
        // non-host: revert to server value (defensive)
        if (settingsRef) {
          settingsRef.get().then(snap => {
            const s = snap.val() || {};
            leagueSelect.value = s.league || 'all';
            updatePoolInfo();
          }).catch(()=>{ leagueSelect.value = 'all'; updatePoolInfo(); });
        }
      }
      updatePoolInfo();
    });

    // leave voluntarily
    async function leaveRoomCleanup(){
      if (!currentRoomId) return;
      try {
        db.ref(`rooms/${currentRoomId}/players`).off();
        db.ref(`rooms/${currentRoomId}/lastResult`).off();
        db.ref(`rooms/${currentRoomId}/isSpinning`).off();
        db.ref(`rooms/${currentRoomId}/spinData`).off();
        if (settingsRef) settingsRef.off();
      } catch(e){}
      if (connectedRef) { try { connectedRef.off(); } catch(e){} connectedRef = null; }
      if (playerRef) {
        try { playerRef.onDisconnect().cancel().catch(()=>{}); playerRef.update({ online:false, lastSeen: firebase.database.ServerValue.TIMESTAMP }).catch(()=>{}); } catch(e){}
        playerRef = null;
      }
      if (isHost && hostRef) {
        try { hostRef.onDisconnect().cancel().catch(()=>{}); await hostRef.remove(); } catch(e){}
        hostOnDisconnectRegistered = false;
      }
      if (hostRef) { try { hostRef.off(); hostRef = null; } catch(e){} }
      if (settingsRef) { try { settingsRef.off(); settingsRef = null; } catch(e){} }
      localStorage.removeItem(KEY_ROOM);
      currentRoomId = '';
      document.getElementById('loginArea').style.display = 'flex';
      roomArea.classList.add('hidden');
    }

    // bindings
    spinBtn.addEventListener('click', doSpin);
    joinCodeInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') confirmJoinBtn.click(); });

    // auto-fill stored name and optionally room param
    const storedName = localStorage.getItem(KEY_NAME);
    if (storedName) usernameInput.value = storedName;

    const urlParams = new URLSearchParams(window.location.search);
    const roomParam = urlParams.get('room');
    if (roomParam && /^\d{6}$/.test(roomParam)) {
      joinBox.classList.remove('hidden');
      joinCodeInput.value = roomParam;
      joinCodeInput.disabled = false;
    }

    // best-effort mark offline on unload
    window.addEventListener('beforeunload', () => {
      try { if (playerRef) playerRef.update({ online:false, lastSeen: firebase.database.ServerValue.TIMESTAMP }); } catch(e){}
    });

    // Expose a couple of helpers (optional)
    window.__roleta = { db, generateUniqueRoomCode };
  </script>
</body>
</html>

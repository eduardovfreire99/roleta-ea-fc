<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Roleta EA FC 26 — Multiplayer</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

  <style>
    :root{
      --bg-900:#05060a; --bg-800:#07121a; --card:#071824; --muted:#9aa9bb; --text:#e6eef6;
      --accent-a:#00f2fe; --accent-b:#00ff87; --success:#10b981; --danger:#ff5a6b;
      --glass-border:rgba(255,255,255,0.04); --soft-shadow:0 10px 30px rgba(0,0,0,0.6);
      --card-radius:14px;
    }

    html,body{height:100%;margin:0;font-family:Inter, "Segoe UI", Roboto, system-ui, -apple-system, Arial;color:var(--text);background:var(--bg-900);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    body.site-wallpaper{ background-image:url('assets/web.png'); background-size:cover; background-position:center; background-repeat:no-repeat; background-attachment:fixed; position:relative; }
    body.site-wallpaper::before{ content:""; position:fixed; inset:0; pointer-events:none; background:linear-gradient(180deg, rgba(4,8,12,0.72), rgba(4,8,12,0.18)); z-index:0; }
    @media(max-width:900px){ body.site-wallpaper{ background-image:url('assets/mobile.png'); background-attachment:scroll; } }

    body { overflow: hidden; }

    .app-wrap { max-width:1200px; margin:18px auto; padding:20px; position:relative; z-index:1; box-sizing:border-box; height:calc(100vh - 36px); display:flex; flex-direction:column; gap:18px; }

    .login-card{ background:linear-gradient(180deg,var(--card), rgba(6,18,28,0.95)); border-radius:var(--card-radius); padding:18px; box-shadow:var(--soft-shadow); border:1px solid var(--glass-border); max-width:640px; margin:0 auto; box-sizing:border-box; }
    .login-head{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .logo-box{ width:52px; height:52px; border-radius:12px; background:linear-gradient(135deg,var(--accent-a),var(--accent-b)); display:flex; align-items:center; justify-content:center; font-weight:800; color:#021214; font-size:18px; box-shadow:0 6px 18px rgba(0,0,0,0.45); }
    .logo-box img{ width:100%; height:100%; object-fit:cover; border-radius:10px; display:block; }
    .login-title{ font-size:1.02rem; margin:0 }
    .login-sub{ margin:0; color:var(--muted); font-size:0.88rem }

    .field{ position:relative; margin-top:8px; }
    .field input.input{ width:100%; padding:14px 12px; background:#04151d; border:none; color:var(--text); border-radius:10px; outline:none; font-size:0.96rem; box-sizing:border-box; }
    .field label.flabel{ position:absolute; left:12px; top:12px; font-size:0.90rem; color:var(--muted); pointer-events:none; transition: transform .12s ease, font-size .12s ease; background:transparent; padding:0 4px; }
    .field svg.icon{ position:absolute; right:10px; top:50%; transform:translateY(-50%); width:18px; height:18px; opacity:0.85; fill:var(--muted); pointer-events:none; }

    .field input:focus + label.flabel,
    .field input:not(:placeholder-shown) + label.flabel {
      transform: translateY(-28px) scale(.92);
      font-size:0.78rem;
      color:var(--accent-a);
    }

    .login-actions{ display:flex; gap:10px; align-items:center; margin-top:12px; flex-wrap:wrap; }
    .btn{ cursor:pointer; border-radius:10px; padding:11px 12px; border:none; font-weight:800; }
    .btn-primary{ background:linear-gradient(90deg,var(--accent-a),var(--accent-b)); color:#021214; box-shadow:0 10px 28px rgba(0,242,254,0.06); width:auto; }
    .btn-ghost{ background:transparent; color:var(--text); border:1px solid rgba(255,255,255,0.04); width:auto; }

    .join-box{ display:none; margin-top:10px; }

    .room-card{ background:linear-gradient(180deg, rgba(3,10,16,0.95), rgba(3,8,12,0.96)); border-radius:14px; padding:16px; box-shadow:var(--soft-shadow); border:1px solid var(--glass-border); display:flex; flex-direction:column; gap:12px; flex:1; box-sizing:border-box; min-height:0; }
    .room-header{ display:flex; align-items:center; gap:12px; justify-content:space-between; }
    .room-info{ display:flex; gap:12px; align-items:center; }
    .room-id{ font-weight:900; font-size:1rem; letter-spacing:0.6px; }
    .room-meta{ color:var(--muted); font-size:0.88rem; }
    .controls-row{ display:flex; gap:10px; align-items:center; margin-top:8px; flex-wrap:wrap; }
    .small-btn{ background:#0f2a36; color:var(--text); border:1px solid rgba(255,255,255,0.03); padding:8px 10px; border-radius:10px; cursor:pointer; }

    .players{ margin-top:8px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .player{ background:linear-gradient(180deg,#071a22,#04202a); padding:8px 10px; border-radius:10px; border:1px solid rgba(255,255,255,0.03); color:var(--text); display:flex; flex-direction:column; align-items:flex-start; font-weight:700; }
    .player-inner{ display:flex; align-items:center; gap:8px; width:100%; }
    .player .host-badge{ background:#ffd984; color:#2b1a00; padding:4px 8px; border-radius:999px; font-weight:800; font-size:0.75rem; }
    .inactive-badge{ font-size:0.72rem; color:var(--danger); background:rgba(255,90,107,0.06); padding:4px 8px; border-radius:8px; border:1px solid rgba(255,90,107,0.12); margin-bottom:6px; font-weight:800; }

    .room-main{ margin-top:8px; display:grid; grid-template-columns:1fr 320px; gap:12px; align-items:start; min-height:0; }
    @media(max-width:980px){ .room-main{ grid-template-columns:1fr; } }

    .panel{ background:linear-gradient(180deg,#05161f,#04121a); border-radius:12px; padding:12px; border:1px solid rgba(255,255,255,0.03); }
    .panel h4{ margin:0 0 8px 0; font-size:0.95rem; }
    .panel .row{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px; color:var(--muted); }

    .roulette-wrapper{ margin-top:12px; position:relative; height:120px; border-radius:10px; background:#0f172a; overflow:hidden; border:2px solid #334155 }
    .roulette-wrapper::before{ content:''; position:absolute; left:50%; top:0; width:4px; height:100%; background:#ff0055; transform:translateX(-50%); z-index:10 }
    .roulette-container{ position:absolute; left:0; top:0; height:100%; display:flex; align-items:center; will-change:transform }
    .roulette-item{ min-width:180px; height:80px; margin:0 5px; background:linear-gradient(145deg,#1e293b,#0f172a); border-radius:8px; border:1px solid #334155; display:flex; flex-direction:column; justify-content:center; align-items:center; font-weight:700; color:#e2e8f0 }

    #spinBtn{ margin-top:12px; width:100%; padding:12px; border-radius:10px; font-weight:900; border:none; background:linear-gradient(90deg,var(--accent-a),var(--accent-b)); color:#021214; cursor:pointer; }

    .turn-banner{ width:100%; border-radius:10px; padding:12px; text-align:center; margin-bottom:12px; font-weight:900; font-size:1.05rem; display:none }
    .turn-banner.you{ background:linear-gradient(90deg, rgba(16,185,129,0.12), rgba(16,185,129,0.06)); color:var(--success); border:1px solid rgba(16,185,129,0.12); }
    .turn-banner.wait-red{ background:#3a1114; color:var(--danger); border:1px solid rgba(255,77,109,0.12); }

    .result{ margin-top:12px; padding:12px; border-radius:8px; border:1px solid rgba(16,185,129,0.25); display:none; background:linear-gradient(180deg,#021419,#07151b); }

    .floating-modal{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:linear-gradient(180deg,#1a1a2e,#0f0f1e); border-radius:16px; padding:24px; box-shadow:0 20px 60px rgba(0,0,0,0.8); border:1px solid rgba(255,255,255,0.1); z-index:9999; max-width:400px; width:90%; animation:modalPop 0.3s ease; }
    @keyframes modalPop{ from{ transform:translate(-50%,-50%) scale(0.8); opacity:0; } to{ transform:translate(-50%,-50%) scale(1); opacity:1; } }
    .floating-modal-content{ text-align:center; }
    .floating-modal-title{ font-size:1.2rem; font-weight:900; color:var(--text); margin:0 0 12px 0; }
    .floating-modal-text{ font-size:1rem; color:var(--muted); margin:0 0 20px 0; }
    .floating-modal-btn{ background:linear-gradient(90deg,var(--accent-a),var(--accent-b)); color:#021214; border:none; padding:12px 24px; border-radius:10px; font-weight:800; cursor:pointer; width:100%; }
    .floating-modal-btn:hover{ opacity:0.9; }

    @media(max-width:600px){
      .app-wrap{ padding:10px; margin:8px auto; height:100vh; gap:10px; }
      .login-card{ padding:12px; border-radius:12px; }
      .logo-box{ width:44px; height:44px; font-size:16px; }
      .field input.input{ padding:12px 10px; font-size:0.92rem; }
      .field label.flabel{ top:10px; left:10px; }
      .field input:focus + label.flabel, .field input:not(:placeholder-shown) + label.flabel{ transform:translateY(-22px) scale(.92); font-size:0.78rem; }
      .login-actions{ gap:8px; }
      .btn-primary,.btn-ghost{ flex:1; width:100%; padding:10px; font-size:0.95rem; }
      .room-card{ padding:12px; border-radius:12px; gap:8px; min-height:0; }
      .room-header{ gap:8px; }
      .room-id{ font-size:0.98rem; }
      .room-meta{ font-size:0.82rem; }
      .room-main{ grid-template-columns:1fr; gap:8px; }
      .panel{ display:none; }
      .players{ gap:6px; }
      .player{ padding:6px 8px; border-radius:8px; font-size:0.92rem; }
      .roulette-wrapper{ height:88px; }
      .roulette-item{ min-width:140px; height:64px; font-size:0.9rem; }
      #spinBtn{ padding:10px; font-size:0.95rem; }
      .small-btn{ padding:8px; font-size:0.88rem; border-radius:8px; }
      .left-col{ overflow:hidden; }
    }

    @media(max-width:420px){
      .roulette-wrapper{ height:74px; }
      .roulette-item{ min-width:120px; height:56px; font-size:0.86rem; }
      .login-card{ padding:10px; }
      .field input.input{ padding:10px 8px; font-size:0.9rem; }
    }

    *{ box-sizing:border-box; max-width:100%; }
  </style>
</head>
<body class="site-wallpaper">
  <div class="app-wrap">
    <div id="loginArea" class="login-card">
      <div class="login-head">
        <div class="logo-box"><img src="assets/logo.png" alt="logo" /></div>
        <div>
          <h3 class="login-title">Sorteador EA FC 26</h3>
          <p class="login-sub">Entre com seu nome para criar/entrar em uma sala</p>
        </div>
      </div>

      <div class="field">
        <input id="usernameInput" class="input" type="text" placeholder=" " autocomplete="name" />
        <label class="flabel">Seu nome</label>
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-4 0-8 2-8 4v2h16v-2c0-2-4-4-8-4z"></path></svg>
      </div>

      <div class="login-actions">
        <button id="createBtn" class="btn btn-primary">Criar Sala</button>
        <button id="showJoinBtn" class="btn btn-ghost">Entrar</button>
      </div>

      <div id="joinBox" class="join-box">
        <div style="margin-top:10px;">
          <label class="login-sub" style="margin-bottom:6px; display:block; color:var(--muted)">Código da sala (6 dígitos)</label>
          <div style="display:flex; gap:8px;">
            <input id="joinCodeInput" class="input" placeholder="000000" />
            <button id="confirmJoinBtn" class="btn btn-ghost">Confirmar</button>
          </div>
        </div>
      </div>

      <div style="margin-top:10px; color:var(--muted)" id="statusBadge">Conectando...</div>
    </div>

    <div id="roomCard" class="room-card" style="display:none">
      <div class="room-header">
        <div class="room-info">
          <div class="room-id" id="roomDisplay">-</div>
          <div class="room-meta" id="turnInfo">-</div>
        </div>

        <div style="display:flex; align-items:center; gap:10px;">
          <div id="playersCount" class="room-meta">0 jogadores</div>
          <div id="shareControls" style="display:none;">
            <button id="shareBtn" class="small-btn">📤</button>
            <button id="copyRoomBtn" class="small-btn">📋</button>
            <button id="leaveBtn" class="small-btn">🚪</button>
          </div>
        </div>
      </div>

      <div id="turnBanner" class="turn-banner" style="display:none"></div>

      <div class="room-main">
        <div class="left-col">
          <div id="playersList" class="players"></div>

          <div style="margin-top:8px" class="controls-row">
            <label class="room-meta">Filtrar liga</label>
            <select id="leagueSelect" class="input" style="min-width:140px; padding:8px; border-radius:8px;">
              <option value="all">Todas as Ligas (96)</option>
              <option value="premier">Premier League</option>
              <option value="bundesliga">Bundesliga</option>
              <option value="seriea">Série A</option>
              <option value="ligue1">Ligue 1</option>
              <option value="laliga">La Liga</option>
            </select>
            <div id="poolInfo" class="room-meta" style="margin-left:auto">96 times no pool</div>
          </div>

          <div id="hostStatus" class="room-meta" style="margin-top:6px"></div>
          <div id="spinIndicator" class="room-meta" style="margin-top:6px; display:none;">⏳ Alguém está girando...</div>

          <div class="roulette-wrapper" style="margin-top:10px;">
            <div id="rouletteContainer" class="roulette-container"></div>
          </div>

          <button id="spinBtn">Girar Roleta</button>

          <div id="resultPanel" class="result" style="display:none;">
            <div style="color:var(--success); font-weight:800">Time Sorteado!</div>
            <div id="resultTeam" style="font-size:1.2rem; font-weight:900; margin-top:6px">-</div>
            <div id="resultLeague" class="muted" style="margin-top:6px">-</div>
            <div id="resultPlayer" class="muted" style="margin-top:6px">-</div>
          </div>
        </div>

        <aside class="panel" id="rightPanel">
          <h4>Resumo</h4>
          <div class="row"><div class="muted">Host:</div><div id="hostStatusShort" style="font-weight:800">-</div></div>
          <div class="row"><div class="muted">Turn order:</div><div id="turnOrderHint" class="muted">Visualiza ordem</div></div>

          <div style="margin-top:10px;"><button id="copyRoomBtn2" class="small-btn" style="width:100%;">📋 Copiar código</button></div>
          <div style="margin-top:10px; display:flex; gap:8px;">
            <button id="shareBtn2" class="small-btn" style="flex:1;">📤 Compartilhar</button>
            <button id="leaveBtn2" class="small-btn" style="flex:1;">🚪 Sair</button>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <div id="floatingModal" class="floating-modal" style="display:none;">
    <div class="floating-modal-content">
      <h3 class="floating-modal-title" id="modalTitle">Aviso</h3>
      <p class="floating-modal-text" id="modalText">-</p>
      <button class="floating-modal-btn" id="modalCloseBtn">Entendido</button>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCjfxIJyKBsg9U_GJu4JP2Taq6fMXiGpMA",
      authDomain: "roleta-ea-fc-cc40c.firebaseapp.com",
      databaseURL: "https://roleta-ea-fc-cc40c-default-rtdb.firebaseio.com",
      projectId: "roleta-ea-fc-cc40c",
      storageBucket: "roleta-ea-fc-cc40c.firebasestorage.app",
      messagingSenderId: "394316068027",
      appId: "1:394316068027:web:39151123593571769b659e"
    };

    const KEY_PLAYER = 'roleta_player_id';
    const KEY_NAME = 'roleta_username';
    const KEY_ROOM = 'roleta_room_id';

    let currentPlayerId = localStorage.getItem(KEY_PLAYER);
    if (!currentPlayerId) { currentPlayerId = Math.random().toString(36).substr(2,9); localStorage.setItem(KEY_PLAYER, currentPlayerId); }

    let db;
    let currentUsername = '';
    let currentRoomId = localStorage.getItem(KEY_ROOM) || '';
    let currentPool = [];
    let isSpinning = false;

    let playerRef = null;
    let connectedRef = null;
    let onDisconnectRegistered = false;
    let hostRef = null;
    let roomHostId = null;
    let isHost = false;
    let hostOnDisconnectRegistered = false;
    let settingsRef = null;

    let latestTurnOrder = [];
    let inactivityCleanupInterval = null;
    let isBeingRemoved = false;

    const usernameInputEl = document.getElementById('usernameInput');
    const createBtnEl = document.getElementById('createBtn');
    const showJoinBtnEl = document.getElementById('showJoinBtn');
    const joinBoxEl = document.getElementById('joinBox');
    const joinCodeInputEl = document.getElementById('joinCodeInput');
    const confirmJoinBtnEl = document.getElementById('confirmJoinBtn');

    const roomCardEl = document.getElementById('roomCard');
    const roomDisplayEl = document.getElementById('roomDisplay');
    const playersListEl = document.getElementById('playersList');
    const playersCountEl = document.getElementById('playersCount');
    const shareControlsEl = document.getElementById('shareControls');
    const shareBtnEl = document.getElementById('shareBtn');
    const copyRoomBtnEl = document.getElementById('copyRoomBtn');
    const leaveBtnEl = document.getElementById('leaveBtn');

    const leagueSelectEl = document.getElementById('leagueSelect');
    const poolInfoEl = document.getElementById('poolInfo');
    const rouletteContainerEl = document.getElementById('rouletteContainer');
    const spinBtnEl = document.getElementById('spinBtn');
    const spinIndicatorEl = document.getElementById('spinIndicator');
    const resultPanelEl = document.getElementById('resultPanel');
    const resultTeamEl = document.getElementById('resultTeam');
    const resultLeagueEl = document.getElementById('resultLeague');
    const resultPlayerEl = document.getElementById('resultPlayer');
    const noticeEl = document.getElementById('statusBadge');
    const turnInfoEl = document.getElementById('turnInfo');
    const hostStatusEl = document.getElementById('hostStatus');
    const turnBannerEl = document.getElementById('turnBanner');
    const floatingModalEl = document.getElementById('floatingModal');
    const modalTitleEl = document.getElementById('modalTitle');
    const modalTextEl = document.getElementById('modalText');
    const modalCloseBtnEl = document.getElementById('modalCloseBtn');

    function showFloatingModal(title, message) {
      modalTitleEl.textContent = title;
      modalTextEl.textContent = message;
      floatingModalEl.style.display = 'block';
    }

    function hideFloatingModal() {
      floatingModalEl.style.display = 'none';
    }

    modalCloseBtnEl.addEventListener('click', hideFloatingModal);

    function initFirebase(){ const app = firebase.initializeApp(firebaseConfig); db = firebase.database(app); }
    initFirebase();

    const teamsDB = {
      premier: { name: "Premier League", teams: ["Arsenal","Aston Villa","Bournemouth","Brentford","Brighton","Chelsea","Crystal Palace","Everton","Fulham","Ipswich Town","Leicester City","Liverpool","Manchester City","Manchester United","Newcastle United","Nottingham Forest","Southampton","Tottenham Hotspur","West Ham","Wolverhampton"] },
      bundesliga: { name: "Bundesliga", teams: ["Bayer Leverkusen","Bayern de Munique","Borussia Dortmund","Borussia Mönchengladbach","Eintracht Frankfurt","FC Augsburg","FC Heidenheim","FC St. Pauli","Holstein Kiel","Mainz 05","RB Leipzig","SC Freiburg","SV Werder Bremen","TSG Hoffenheim","Union Berlin","VfB Stuttgart","VfL Bochum","VfL Wolfsburg"] },
      seriea: { name: "Série A Itália", teams: ["AC Milan","Atalanta","Bologna","Cagliari","Como","Empoli","Fiorentina","Genoa","Hellas Verona","Inter de Milão","Juventus","Lazio","Lecce","Monza","Napoli","Parma","AS Roma","Torino","Udinese","Venezia"] },
      ligue1: { name: "Ligue 1 França", teams: ["Angers","Auxerre","Brest","Le Havre","Lens","Lille","Monaco","Montpellier","Nantes","Nice","Olympique de Lyon","Olympique de Marseille","PSG","Reims","Rennes","Saint-Étienne","Strasbourg","Toulouse"] },
      laliga: { name: "La Liga Espanha", teams: ["Alavés","Athletic Bilbao","Atlético de Madrid","Barcelona","Celta de Vigo","Espanyol","Getafe","Girona","Las Palmas","Leganés","Mallorca","Osasuna","Rayo Vallecano","Real Betis","Real Madrid","Real Sociedad","Sevilla","Valencia","Valladolid","Villarreal"] }
    };

    function shuffle(a){ return a.sort(()=>Math.random()-0.5); }
    function getActivePoolFromLeague(leagueValue){
      let pool=[];
      if (!leagueValue || leagueValue === 'all') {
        Object.keys(teamsDB).forEach(k => teamsDB[k].teams.forEach(t => pool.push({ name: t, league: teamsDB[k].name })));
      } else {
        if (teamsDB[leagueValue]) teamsDB[leagueValue].teams.forEach(t => pool.push({ name: t, league: teamsDB[leagueValue].name }));
      }
      return pool;
    }
    function getActivePool(){ return getActivePoolFromLeague(leagueSelectEl.value); }
    function updatePoolInfo(){ currentPool = getActivePool(); poolInfoEl.textContent = `${currentPool.length} times disponíveis`; setupStaticRoulette(); }
    function setupStaticRoulette(){ const pool = getActivePool(); rouletteContainerEl.style.transition='none'; rouletteContainerEl.style.transform='translateX(0px)'; rouletteContainerEl.innerHTML=''; const display = pool.length>5 ? pool.slice(0,10) : [...pool,...pool,...pool]; display.forEach(it => { const d=document.createElement('div'); d.className='roulette-item'; d.innerHTML=`<div>${it.name}</div><div style="font-size:0.7rem;color:#94a3b8;margin-top:4px">${it.league}</div>`; rouletteContainerEl.appendChild(d); }); }

    function getItemFullWidth() {
      const item = rouletteContainerEl.querySelector('.roulette-item');
      if (!item) return 180 + 10;
      const style = window.getComputedStyle(item);
      const ml = parseFloat(style.marginLeft) || 0;
      const mr = parseFloat(style.marginRight) || 0;
      return item.offsetWidth + ml + mr;
    }
    function computeCenterOffset(itemFullWidth){
      const wrapperWidth = document.querySelector('.roulette-wrapper').offsetWidth;
      return (wrapperWidth - itemFullWidth) / 2;
    }

    async function generateUniqueRoomCode(attempts = 8) {
      for (let i = 0; i < attempts; i++) {
        const code = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
        const snap = await db.ref(`rooms/${code}`).get();
        if (!snap.exists()) return code;
      }
      throw new Error('Não foi possível gerar código único. Tente novamente.');
    }

    function showNotice(msg, ms = 2500) { noticeEl.textContent = msg; setTimeout(()=> noticeEl.textContent = 'Conectando...', ms); }

    function applySettings(settings) {
      if (!settings) return;
      if (typeof settings.league !== 'undefined') {
        leagueSelectEl.value = settings.league || 'all';
        updatePoolInfo();
        showNotice(`Host mudou a liga para: ${settings.league}`, 1400);
      }
    }

    function setActiveFlag(active) { if (!playerRef) return; playerRef.update({ active: !!active }).catch(()=>{}); }
    document.addEventListener('visibilitychange', () => { setActiveFlag(document.visibilityState === 'visible'); updateSpinButtonState().catch(()=>{}); });

    window.addEventListener('beforeunload', (event) => {
      if (currentRoomId && isHost) {
        event.preventDefault();
      }
    });

    async function removeFromTurnOrderAndNormalize(playerId){
      if (!currentRoomId) return;
      await db.ref(`rooms/${currentRoomId}/turnOrder`).transaction(current => {
        if (!current || !Array.isArray(current)) return current;
        return current.filter(id => id !== playerId);
      });
      await db.ref(`rooms/${currentRoomId}`).transaction(room => {
        if (!room) return room;
        const order = room.turnOrder || [];
        if (!Array.isArray(order) || order.length === 0) { room.currentTurnIndex = 0; return room; }
        if (room.currentTurnIndex === undefined || room.currentTurnIndex === null) room.currentTurnIndex = 0;
        if (room.currentTurnIndex >= order.length) room.currentTurnIndex = room.currentTurnIndex % order.length;
        return room;
      });
    }

    async function removeInactivePlayersOlderThan1Hour(){
      if (!currentRoomId) return;
      try {
        const playersSnap = await db.ref(`rooms/${currentRoomId}/players`).get();
        const players = playersSnap.val() || {};
        const now = Date.now();
        const oneHourMs = 60 * 60 * 1000;

        for (const [playerId, playerData] of Object.entries(players)) {
          if (playerId === roomHostId) continue;
          
          const lastSeen = playerData.lastSeen || 0;
          const isOffline = playerData.online === false;
          
          if (isOffline && (now - lastSeen) > oneHourMs) {
            await db.ref(`rooms/${currentRoomId}/players/${playerId}`).remove();
            await removeFromTurnOrderAndNormalize(playerId);
          }
        }
      } catch (e) {
        console.warn('removeInactivePlayersOlderThan1Hour error', e);
      }
    }

    async function updateSpinButtonState() {
      try {
        if (!currentRoomId) { spinBtnEl.disabled = true; updateTurnBanner(false, ''); return; }
        const spinSnap = await db.ref(`rooms/${currentRoomId}/isSpinning`).get();
        if (spinSnap.exists() && spinSnap.val()) { spinBtnEl.disabled = true; updateTurnBanner(false, 'Giro em andamento'); return; }
        const hostSnap = await db.ref(`rooms/${currentRoomId}/host`).get();
        if (!hostSnap.exists()) { spinBtnEl.disabled = true; updateTurnBanner(false, 'Sem host'); return; }
        const hostVal = hostSnap.val();
        if (!hostVal || hostVal.online !== true) { spinBtnEl.disabled = true; updateTurnBanner(false, 'Aguardando host'); return; }
        const playersSnap = await db.ref(`rooms/${currentRoomId}/players`).get();
        const players = playersSnap.val() || {};
        const entries = Object.entries(players);
        if (entries.length < 2) { spinBtnEl.disabled = true; updateTurnBanner(false, 'Precisa de pelo menos 2 jogadores'); return; }
        const allActive = entries.every(([id,p]) => p && p.online === true && p.active === true);
        if (!allActive) { spinBtnEl.disabled = true; updateTurnBanner(false, 'Aguardando todos ativos'); return; }
        const orderSnap = await db.ref(`rooms/${currentRoomId}/turnOrder`).get();
        const order = orderSnap.val() || [];
        if (!Array.isArray(order) || order.length < 1) { spinBtnEl.disabled = true; updateTurnBanner(false, 'Ordem inválida'); return; }
        const idxSnap = await db.ref(`rooms/${currentRoomId}/currentTurnIndex`).get();
        const idx = idxSnap.exists() ? idxSnap.val() : 0;
        const currentPid = order[idx % order.length];
        if (currentPid === currentPlayerId) {
          spinBtnEl.disabled = false;
          updateTurnBanner(true, 'É SUA VEZ — GIRAR AGORA');
        } else {
          spinBtnEl.disabled = true;
          const pSnap = await db.ref(`rooms/${currentRoomId}/players/${currentPid}`).get();
          const p = pSnap.val();
          const name = p && p.username ? p.username : 'Jogador';
          updateTurnBanner(false, `Vez de ${name}`, true);
        }
      } catch (e) {
        console.warn('updateSpinButtonState error', e);
        spinBtnEl.disabled = true;
        updateTurnBanner(false, '');

    async function advanceTurn() {
      if (!currentRoomId) return;
      const idxRef = db.ref(`rooms/${currentRoomId}/currentTurnIndex`);
      await idxRef.transaction(current => {
        if (current === null || current === undefined) return 0;
        return current + 1;
      });
      const orderSnap = await db.ref(`rooms/${currentRoomId}/turnOrder`).get();
      const order = orderSnap.val() || [];
      if (!Array.isArray(order) || order.length === 0) { await idxRef.set(0); }
      else { const idxSnap = await idxRef.get(); const val = idxSnap.exists() ? idxSnap.val() : 0; await idxRef.set(val % order.length); }
    }

    function renderSpinItems(items){
      rouletteContainerEl.style.transition='none';

      items.forEach(it => {
        const d=document.createElement('div');

    function animateToIndex(index,duration){
      const itemFullWidth = getItemFullWidth();
      const centerOffset = computeCenterOffset(itemFullWidth);
      const targetX = -(index * itemFullWidth) + centerOffset;
      rouletteContainerEl.style.transition = `transform ${duration}ms cubic-bezier(0.15,0.85,0.35,1)`;
      rouletteContainerEl.style.transform = `translateX(${targetX}px)`;
    }

    function setupSpinListener(){
      if (!currentRoomId) return;
      db.ref(`rooms/${currentRoomId}/spinData`).on('value', snap => {
        const d = snap.val();
        if (!d) return;
        if (d.playerId === currentPlayerId) return;
        renderSpinItems(d.items);
        const now = Date.now();
        const elapsed = Math.max(0, now - d.startTime);
        const remaining = Math.max(0, (d.duration || 5000) - elapsed);
        const itemFullWidth = getItemFullWidth();
        const centerOffset = computeCenterOffset(itemFullWidth);
        const targetX = -(d.targetIndex * itemFullWidth) + centerOffset;
        if (remaining <= 0) {
          rouletteContainerEl.style.transition='none';
          rouletteContainerEl.style.transform = `translateX(${targetX}px)`;
          onSpinFinished();
          return;
        }
        requestAnimationFrame(()=>requestAnimationFrame(()=> {
          rouletteContainerEl.style.transition = `transform ${remaining}ms cubic-bezier(0.15,0.85,0.35,1)`;
          rouletteContainerEl.style.transform = `translateX(${targetX}px)`;
        }));
        spinIndicatorEl.style.display='block';
        spinBtnEl.disabled = true;
        setTimeout(()=>{ spinIndicatorEl.style.display='none'; if (!isSpinning) spinBtnEl.disabled=false; onSpinFinished(); }, remaining + 50);
      });
    }

    async function doSpin(){
      if (!currentRoomId) return;
      if (isSpinning) return;
      const hostSnap = await db.ref(`rooms/${currentRoomId}/host`).get();
      const hostVal = hostSnap.val();
      if (!hostVal || hostVal.online !== true) { showFloatingModal('Aviso', 'Aguardando host para girar a roleta'); return; }
      const playersSnap = await db.ref(`rooms/${currentRoomId}/players`).get();
      const players = playersSnap.val() || {};
      const entries = Object.entries(players);
      if (entries.length < 2) { showFloatingModal('Aviso', 'São necessários pelo menos 2 jogadores para girar.'); return; }
      const allActive = entries.every(([id,p]) => p && p.online === true && p.active === true);
      if (!allActive) { showFloatingModal('Aviso', 'Aguardando todos os jogadores ativos na aba para girar a roleta'); return; }
      const orderSnap = await db.ref(`rooms/${currentRoomId}/turnOrder`).get();
      const order = orderSnap.val() || [];
      if (!Array.isArray(order) || order.length === 0) { showFloatingModal('Aviso', 'Ordem inválida'); return; }
      const idxSnap = await db.ref(`rooms/${currentRoomId}/currentTurnIndex`).get();
      const idx = idxSnap.exists() ? idxSnap.val() : 0;
      const currentPid = order[idx % (order.length || 1)];
      if (currentPid !== currentPlayerId) { showFloatingModal('Não é sua vez', 'Não é sua vez de girar'); return; }
      isSpinning = true;
      spinBtnEl.disabled = true;
      resultPanelEl.style.display = 'none';
      await db.ref(`rooms/${currentRoomId}/isSpinning`).set({ playerId: currentPlayerId, username: currentUsername, startTime: Date.now() });
      const pool = getActivePool();
      if (pool.length === 0) { showFloatingModal('Aviso', 'Nenhum time disponível'); return; }

      // --- ALTERAÇÃO: tornar a posição final mais aleatória ---
      const winnerIndex = Math.floor(Math.random()*pool.length);
      const winner = pool[winnerIndex];

      // Escolhe um número aleatório de "ciclos" (voltas) para a roleta, para variar o comprimento total
      const cycles = 4 + Math.floor(Math.random() * 6); // entre 4 e 9 ciclos
      let extended = [];
      for (let i = 0; i < cycles; i++) {
        extended = extended.concat(shuffle([...pool]));
      }

      // duração do giro aleatória (entre 4.5s e 7s)
      const duration = 4500 + Math.floor(Math.random() * 2500);

      // calcula posição final aproximada para o vencedor: coloca o vencedor próximo ao fim, com pequeno jitter
      const baseFinalPos = (cycles - 1) * pool.length + winnerIndex;
      const jitterRange = Math.min(6, pool.length); // não jitterar além do tamanho do pool
      const jitter = Math.floor((Math.random() - 0.5) * jitterRange); // pode ser negativo ou positivo
      let targetIndex = baseFinalPos + jitter;
      if (targetIndex < 0) targetIndex = 0;
      if (targetIndex >= extended.length) targetIndex = extended.length - 1;

      // garante que o vencedor esteja na posição final escolhida
      extended[targetIndex] = winner;

      const spinData = { items: extended.map(it=>({name:it.name,league:it.league})), targetIndex, duration: duration, startTime:Date.now(), playerId:currentPlayerId, username:currentUsername };
      // --- FIM DA ALTERAÇÃO ---

      await db.ref(`rooms/${currentRoomId}/spinData`).set(spinData);
      renderSpinItems(spinData.items);
      animateToIndex(spinData.targetIndex, spinData.duration);
      setTimeout(async () => {
        const finalItem = (spinData && Array.isArray(spinData.items) && typeof spinData.targetIndex === 'number')
          ? spinData.items[spinData.targetIndex]
          : { name: winner.name, league: winner.league };
        await db.ref(`rooms/${currentRoomId}/lastResult`).set({
          winner: finalItem.name,
          league: finalItem.league,
          username: currentUsername,
          playerId: currentPlayerId,
          targetIndex: spinData.targetIndex,
          timestamp: Date.now()
        });
        await db.ref(`rooms/${currentRoomId}/isSpinning`).remove();
        await db.ref(`rooms/${currentRoomId}/spinData`).remove();
        showResult({ winner: finalItem.name, league: finalItem.league, username: currentUsername });
        await advanceTurn();
        await updateSpinButtonState();
        isSpinning = false;
        spinBtnEl.disabled = false;
        onSpinFinished();
      }, spinData.duration);
    }

    async function leaveRoomCleanup(){
      if (!currentRoomId) return;
      try { await db.ref(`rooms/${currentRoomId}/players/${currentPlayerId}`).remove(); } catch(e){}
      try { await db.ref(`rooms/${currentRoomId}/turnOrder`).transaction(current => { if (!current || !Array.isArray(current)) return current; return current.filter(id => id !== currentPlayerId); }); } catch(e){}
      
      if (isHost && currentRoomId) {
        try {
          const playersSnap = await db.ref(`rooms/${currentRoomId}/players`).get();
          const players = playersSnap.val() || {};
          const remainingIds = Object.keys(players);
          if (remainingIds.length > 0) {
            const orderSnap = await db.ref(`rooms/${currentRoomId}/turnOrder`).get();
            const order = orderSnap.val() || [];
            let newHostId = null;
            for (let id of order) { if (id && players[id]) { newHostId = id; break; } }
            if (!newHostId) newHostId = remainingIds[0];
            const newHostUsername = players[newHostId].username || 'Host';
            const newHostOnline = !!players[newHostId].online;
            await db.ref(`rooms/${currentRoomId}/host`).set({ playerId: newHostId, username: newHostUsername, online: newHostOnline, transferredAt: Date.now() });
          } else {
            await db.ref(`rooms/${currentRoomId}`).remove();
          }
        } catch(e){ console.warn('host leave transfer failed', e); }
      }
      
      try { if (playerRef) playerRef.onDisconnect().cancel().catch(()=>{}); } catch(e){}
      try { if (hostRef) hostRef.onDisconnect().cancel().catch(()=>{}); } catch(e){}
      try { if (settingsRef) settingsRef.off(); } catch(e){}
      try { db.ref(`rooms/${currentRoomId}/players`).off(); db.ref(`rooms/${currentRoomId}/lastResult`).off(); db.ref(`rooms/${currentRoomId}/isSpinning`).off(); db.ref(`rooms/${currentRoomId}/spinData`).off(); db.ref(`rooms/${currentRoomId}/turnOrder`).off(); db.ref(`rooms/${currentRoomId}/currentTurnIndex`).off(); } catch(e){}
      
      if (inactivityCleanupInterval) clearInterval(inactivityCleanupInterval);
      localStorage.removeItem(KEY_ROOM);
      currentRoomId = '';
      document.getElementById('loginArea').style.display = 'block';
      roomCardEl.style.display = 'none';
    }

      try {
        const roomSnap = await db.ref(`rooms/${code}`).get();
        if (!roomSnap.exists()) { alert('Sala não encontrada.'); return; }
        const hostSnap = await db.ref(`rooms/${code}/host`).get();
        const hostVal = hostSnap.val();
        if (!hostVal || hostVal.online !== true) { alert('Sala sem host disponível.'); return; }
        currentUsername = usernameInputEl.value.trim();
        if (!currentUsername) { alert('Digite seu nome para entrar.'); return; }
        localStorage.setItem(KEY_NAME, currentUsername);
        localStorage.setItem(KEY_ROOM, code);
        await enterRoom(code, false);
      } catch (e) {
        console.error(e);
        alert('Erro ao entrar — verifique o código e tente novamente.');
      }
    });

    joinCodeInputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') confirmJoinBtnEl.click(); });

    spinBtnEl.addEventListener('click', () => doSpin());
    copyRoomBtnEl.addEventListener('click', () => { if (!currentRoomId) return; navigator.clipboard.writeText(currentRoomId).then(()=> alert('Código copiado!')); });

    const storedName = localStorage.getItem(KEY_NAME);
    if (storedName) usernameInputEl.value = storedName;

    usernameInputEl.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        if (joinBoxEl.style.display === 'none' || joinBoxEl.style.display === '') joinBoxEl.style.display = 'block';
        joinCodeInputEl.focus();
      }
    });

    const urlParams = new URLSearchParams(window.location.search);
    const roomParam = urlParams.get('room');
    if (roomParam && /^\d{6}$/.test(roomParam)) {
      joinCodeInputEl.value = roomParam;
      joinBoxEl.style.display = 'block';
    }

    (function tryAutoJoinStored(){
      const storedRoom = localStorage.getItem(KEY_ROOM);
      const storedUser = localStorage.getItem(KEY_NAME);
      if (storedRoom && storedUser) {
        db.ref(`rooms/${storedRoom}/host`).get().then(snap => {
          const v = snap.val();
          if (v && v.online === true) {
            currentUsername = storedUser;
            usernameInputEl.value = storedUser;
            enterRoom(storedRoom, false).catch(()=>{});
          }
        }).catch(()=>{});
      }
    })();
  </script>
</body>
</html>

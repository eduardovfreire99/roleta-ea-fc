<!DOCTYPE html>
<html>
<head>
    <title>Teste Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js"></script>
</head>
<body>
    <h1>Teste Firebase</h1>
    <p id="resultado">Conectando...</p>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCjfxIJyKBsg9U_GJu4JP2Taq6fMXiGpMA",
            authDomain: "roleta-ea-fc-cc40c.firebaseapp.com",
            databaseURL: "https://roleta-ea-fc-cc40c-default-rtdb.firebaseio.com",
            projectId: "roleta-ea-fc-cc40c",
            storageBucket: "roleta-ea-fc-cc40c.firebasestorage.app",
            messagingSenderId: "394316068027",
            appId: "1:394316068027:web:39151123593571769b659e"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database(app);

        db.ref("test").set({message: "Funcionando!"}).then(() => {
            document.getElementById("resultado").textContent = "✅ Firebase conectado!";
        }).catch((error) => {
            document.getElementById("resultado").textContent = "❌ Erro: " + error.message;
        });
    </script>
</body>
</html>
